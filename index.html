<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學習成果實作檔案庫 - Minecraft v3.8</title>
    <style>
        /* --- Minecraft 核心樣式定義 --- */
        :root {
            --mc-gray: #C6C6C6;
            --mc-dark: #555555;
            --mc-light: #FFFFFF;
            --mc-shadow: #373737;
            --mc-button-bg: #707070;
            --mc-hover-bg: #8B8B8B;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: #FFF; 
            font-family: 'Segoe UI', '微軟正黑體', sans-serif;
            overflow: hidden; 
        }

        /* --- Minecraft 按鈕樣式 --- */
        .mc-button {
            background-color: var(--mc-button-bg);
            border: 3px solid #000;
            color: #E0E0E0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 2px 2px #3F3F3F;
            box-shadow: inset 3px 3px 0px var(--mc-light), inset -3px -3px 0px var(--mc-shadow);
            transition: transform 0.05s;
            user-select: none;
            font-weight: bold;
        }
        .mc-button:hover {
            background-color: var(--mc-hover-bg);
            color: #FFF;
            outline: 3px solid #FFF;
            outline-offset: -8px;
        }
        .mc-button:active { transform: scale(0.95); }

        /* 頁面切換 */
        .screen { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; }
        .hidden { display: none !important; }

        /* --- P1: 封面介面 --- */
        #p1 { background: url('cover_art.jpg') center/cover no-repeat; justify-content: flex-start; }
        .p1-title-area { height: 40vh; width: 100%; display: flex; align-items: center; justify-content: center; margin-top: 5vh; }
        #tittle-img { max-height: 95%; image-rendering: pixelated; }
        .p1-button-area { flex: 1; display: flex; align-items: center; justify-content: center; }

        /* --- P2: 主控制台介面 --- */
        #p2 { 
            background: rgba(0,0,0,0.7) url('gui_bg.jpg') center/cover no-repeat; 
            background-blend-mode: overlay;
            justify-content: center;
        }

        .gui-container { width: 85vw; height: 56.66vw; max-height: 85vh; display: flex; flex-direction: column; }
        .tabs-row { display: flex; gap: 4px; padding-left: 12px; }
        .mc-tab { width: 110px; height: 40px; font-size: 14px; border-bottom: none; border-radius: 6px 6px 0 0; margin-top: 8px; }
        .mc-tab.active { background-color: var(--mc-gray); color: #333; height: 48px; margin-top: 0px; z-index: 2; text-shadow: none; }
        
        .gui-panel { 
            flex: 1; background-color: var(--mc-gray); border: 4px solid #000; 
            box-shadow: inset 4px 4px 0px var(--mc-light), inset -4px -4px 0px var(--mc-dark);
            overflow: hidden; padding: 0; z-index: 1; position: relative;
        }

        /* 作品集網格 */
        .work-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 25px; height: 100%; overflow-y: auto; }
        .work-frame { aspect-ratio: 3 / 4; background-color: #8B8B8B; border: 3px solid #000; padding: 10px; display: flex; flex-direction: column; cursor: pointer; }
        .image-slot { width: 100%; aspect-ratio: 1 / 1; background-color: #222; border: 2px solid #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .image-slot img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .work-label { flex: 1; display: flex; align-items: center; justify-content: center; text-align: center; color: #FFF; text-shadow: 2px 2px #000; font-weight: bold; }

        /* 詳細視窗 */
        #detail-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 99; display: flex; align-items: center; justify-content: center; }
        #detail-view { width: 38vh; height: 76vh; background-color: var(--mc-gray); border: 5px solid #000; padding: 20px; display: flex; flex-direction: column; gap: 15px; }

        /* 噴漆控制點 */
        .color-dot { width: 30px; height: 30px; border: 2px solid #FFF; cursor: pointer; transition: transform 0.1s; }
        .color-dot:hover { transform: scale(1.1); }
    </style>
</head>
<body>

    <div id="p1" class="screen">
        <div class="p1-title-area">
            <img src="tittle.jpg" id="tittle-img" alt="Title">
        </div>
        <div class="p1-button-area">
            <button class="mc-button" style="width:280px; height:60px; font-size:20px;" onclick="nav('p2')">啟動系統</button>
        </div>
    </div>

    <div id="p2" class="screen hidden">
        <button class="mc-button" style="position:absolute; top:20px; left:20px; width:100px; height:40px;" onclick="nav('p1')">返回</button>
        
        <div class="gui-container">
            <div class="tabs-row">
                <button class="mc-button mc-tab" onclick="changeTab(this, 'start')">創作起點</button>
                <button class="mc-button mc-tab" onclick="changeTab(this, 'paint')">互動塗鴉</button>
                <button class="mc-button mc-tab active" onclick="changeTab(this, 'works')">作品集</button>
                <button class="mc-button mc-tab" onclick="changeTab(this, 'process')">歷程記錄</button>
                <button class="mc-button mc-tab" onclick="changeTab(this, 'future')">未來發展</button>
            </div>
            
            <div class="gui-panel" id="main-panel">
                </div>
        </div>
    </div>

    <div id="detail-overlay" class="hidden" onclick="closeDetail()">
        <div id="detail-view" onclick="event.stopPropagation()">
            <div style="width:100%; aspect-ratio:1/1; background:#000; border:3px solid #555;">
                <img id="det-img" src="" style="width:100%; height:100%; object-fit:contain;">
            </div>
            <h2 id="det-title" style="color:#000; margin:0; border-bottom:3px solid #8B8B8B;">標題</h2>
            <div id="det-desc" style="flex:1; overflow-y:auto; color:#333; font-size:14px; line-height:1.6;">描述內容...</div>
            <button class="mc-button" style="height:45px; width:100%;" onclick="closeDetail()">關閉視窗</button>
        </div>
    </div>

<script>
    // --- 1. 基礎導覽邏輯 ---
    window.nav = function(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        const target = document.getElementById(id);
        if (target) {
            target.classList.remove('hidden');
            if (id === 'p2') {
                // 進入 P2 時，預設觸發作品集標籤
                const worksBtn = document.querySelectorAll('.mc-tab')[2];
                changeTab(worksBtn, 'works');
            }
        }
    };

    // --- 2. 標籤切換與內容填充 ---
    window.changeTab = function(btn, type) {
        document.querySelectorAll('.mc-tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        const panel = document.getElementById('main-panel');
        panel.innerHTML = ''; // 清空

        if (type === 'works') {
            panel.innerHTML = '<div class="work-grid" id="grid-content"></div>';
            renderWorks();
        }

                        <span style="color:#FFF;">[ 街頭噴漆體驗區 ]</span>
                        <button class="mc-button" style="width:100px; height:30px; font-size:12px;" onclick="clearTabCanvas()">清除牆面</button>

                        <canvas id="tab-canvas" style="position:absolute; top:0; left:0; width:100%; height:100%; cursor:crosshair;"></canvas>
                    </div>
                    <div style="display:flex; gap:15px; padding:15px;">

                        <div class="color-dot" style="background:#00ff00;" onclick="setTabColor('#00ff00')"></div>
                        <div class="color-dot" style="background:#0000ff;" onclick="setTabColor('#0000ff')"></div>
                        <div class="color-dot" style="background:#ffff00;" onclick="setTabColor('#ffff00')"></div>
                        <div class="color-dot" style="background:#ffffff;" onclick="setTabColor('#ffffff')"></div>
                        <div class="color-dot" style="background:#000000; border-color:#555;" onclick="setTabColor('#000000')"></div>
                    </div>
                </div>
            `;
            setTimeout(initTabCanvas, 50);
        } 
        else {
            const titles = { 'start': '🌱 創作起點', 'process': '🛠️ 歷程記錄', 'future': '🚀 未來發展' };
            panel.innerHTML = `
                <div style="color:#000; padding:30px; animation: fadeIn 0.3s;">
                    <h2 style="border-bottom:4px solid #555; padding-bottom:10px;">${titles[type]}</h2>
                    <div style="margin-top:20px; line-height:1.8; font-size:16px;">
                        <p>[ 系統檔案讀取成功 ]</p>
                        <p>請在此處編輯您的個人學習心得與課程實作記錄內容...</p>
                    </div>
                </div>
            `;
        }
    };
