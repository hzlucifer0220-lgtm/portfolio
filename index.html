<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學習成果實作檔案庫 v12.2</title>
    <style>
        :root {
            --mc-gray: #C6C6C6;
            --mc-dark: #555555;
            --mc-light: #FFFFFF;
            --mc-shadow: #373737;
        }

        /* 基礎重置 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: #FFF; 
            font-family: 'Segoe UI', '微軟正黑體', sans-serif;
            overflow: hidden; 
        }

        /* Minecraft 按鈕 */
        .mc-button {
            background: #707070; border: 3px solid #000; color: #E0E0E0; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset 3px 3px 0px var(--mc-light), inset -3px -3px 0px var(--mc-shadow);
            font-weight: bold; text-shadow: 2px 2px #3F3F3F; transition: transform 0.05s;
            user-select: none; position: relative; z-index: 10;
        }
        .mc-button:hover { background: #8B8B8B; color: #FFF; outline: 3px solid #FFF; outline-offset: -8px; }
        .mc-button:active { transform: scale(0.95); }

        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; }

        /* 全域音樂播放器 */
        .global-music-bar {
            position: fixed; top: 15px; right: 15px;
            width: 15vw; min-width: 250px; height: 40px;
            display: flex; flex-direction: row-reverse; 
            align-items: center; gap: 5px; z-index: 2000;
        }
        .player-btn { width: 35px; height: 35px; font-size: 14px; flex-shrink: 0; }
        .marquee-container { 
            flex: 1; height: 30px; background: rgba(0, 0, 0, 0.8); border: 2px solid #555; 
            overflow: hidden; position: relative; display: flex; align-items: center; 
        }
        .marquee-text { 
            position: absolute; white-space: nowrap; color: #FFFFFF; 
            font-family: monospace; font-size: 12px; padding-left: 100%; animation: marquee 10s linear infinite; 
        }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-250%); } }

        /* P1: 封面 */
        #p1 { background: url('cover_art.jpg') center/cover no-repeat; display: flex; position: relative; flex-direction: column; justify-content: flex-end; }
        #star-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }

        /* P2: 主面板 */
        #p2 { background: rgba(0,0,0,0.7) url('gui_bg.jpg') center/cover no-repeat; background-blend-mode: overlay; }
        .gui-container { width: 90vw; height: 60vw; max-height: 85vh; display: flex; flex-direction: column; margin-top: 65px; }
        .tabs-row { display: flex; gap: 4px; padding-left: 10px; }
        .mc-tab { width: 110px; height: 40px; font-size: 13px; border-bottom: none; border-radius: 5px 5px 0 0; margin-top: 8px; }
        .mc-tab.active { background: var(--mc-gray); color: #333; height: 48px; margin-top: 0; z-index: 2; text-shadow: none; box-shadow: inset 3px 3px 0 var(--mc-light); }
        .gui-panel { flex: 1; background: var(--mc-gray); border: 4px solid #000; box-shadow: inset 4px 4px 0 var(--mc-light), inset -4px -4px 0 var(--mc-dark); position: relative; overflow: hidden; }

        /* 噴漆牆區域 */
        .paint-area { width: 100%; height: 100%; display: flex; position: relative; }
        .wall-box { flex: 1; margin: 20px 20px 20px 110px; border: 4px solid #000; background: #333; position: relative; overflow: hidden; }
        #tab-canvas { width: 100%; height: 100%; cursor: crosshair; }
        .paint-sidebar { position: absolute; left: 15px; top: 20px; width: 85px; bottom: 20px; display: flex; flex-direction: column; gap: 5px; padding: 10px; background: rgba(0,0,0,0.8); border: 2px solid #FFF; overflow-y: auto; z-index: 10; }
        .color-dot { width: 100%; aspect-ratio: 1/1; border: 2px solid #FFF; cursor: pointer; flex-shrink: 0; }
        .bg-btn { background: #444; color: white; font-size: 10px; display: flex; align-items: center; justify-content: center; text-align: center; }

        /* 作品集 */
        .work-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 20px; height: 100%; overflow-y: auto; }
        .work-frame { aspect-ratio: 3/4; background: #8B8B8B; border: 3px solid #000; padding: 10px; cursor: pointer; transition: transform 0.2s; }
        .work-frame:hover { transform: translateY(-5px); background: #9D9D9D; }
        .image-slot { width: 100%; aspect-ratio: 1/1; background: #000; border: 2px solid #333; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .image-slot img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .work-label { height: 30px; display: flex; align-items: center; justify-content: center; font-size: 13px; text-shadow: 1px 1px #000; font-weight: bold; }
        
        #detail-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:3000; display:none; align-items:center; justify-content:center; }
        #detail-view { width: 320px; height: 600px; background: var(--mc-gray); border: 4px solid #000; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
    </style>
</head>
<body>

    <div class="global-music-bar">
        <button class="mc-button player-btn" onclick="window.toggleMusic()">
            <span id="music-icon">🔇</span>
        </button>
        <button class="mc-button player-btn" onclick="window.nextTrack()"> > </button>
        <div class="marquee-container">
            <div id="track-name" class="marquee-text">等待播放...</div>
        </div>
        <button class="mc-button player-btn" onclick="window.prevTrack()"> < </button>
    </div>
    <audio id="bg-audio" preload="auto"></audio>

    <div id="p1" class="screen">
        <canvas id="star-canvas"></canvas>
        <div style="display: flex; align-items: center; justify-content: center; position: relative; z-index: 10; margin-bottom: 25vh;">
            <button class="mc-button" style="width: 200px; height: 60px; font-size: 24px;" onclick="window.startEverything()">開始</button>
        </div>
    </div>

    <div id="p2" class="screen">
        <button class="mc-button" style="position:absolute; top:15px; left:15px; width:80px; height:35px; font-size:12px; z-index: 110;" onclick="window.nav('p1')">返回</button>
        <div class="gui-container">
            <div class="tabs-row">
                <button class="mc-button mc-tab" onclick="window.changeTab(this, 'start')">創作起點</button>
                <button class="mc-button mc-tab" onclick="window.changeTab(this, 'paint')">互動塗鴉</button>
                <button class="mc-button mc-tab" onclick="window.changeTab(this, 'works')">作品集</button>
                <button class="mc-button mc-tab" onclick="window.changeTab(this, 'process')">歷程記錄</button>
                <button class="mc-button mc-tab" onclick="window.changeTab(this, 'future')">未來發展</button>
            </div>
            <div class="gui-panel" id="main-panel"></div>
        </div>
    </div>

    <div id="detail-overlay" onclick="this.style.display='none'">
        <div id="detail-view" onclick="event.stopPropagation()">
            <img id="det-img" src="" style="width:100%; aspect-ratio:1/1; background:#000; border:3px solid #555; object-fit:contain;">
            <h3 id="det-title" style="color: #000; margin: 0; border-bottom: 2px solid #8B8B8B;">標題</h3>
            <div id="det-desc" style="flex: 1; color: #333; overflow-y: auto; font-size: 14px; line-height: 1.5;"></div>
            <button class="mc-button" style="height: 45px; width: 100%;" onclick="document.getElementById('detail-overlay').style.display='none'">關閉</button>
        </div>
    </div>

<script>
    /* --- 1. 資料變數 --- */
    const playlist = [
        { name: "Now Playing: late night", src: "late night.mp3" },
        { name: "Now Playing: made it through", src: "made it through.mp3" },
        { name: "Now Playing: M.I.A", src: "M.I.A.mp3" }
    ];
    let currentTrackIndex = 0, isPlaying = false, painting = false, currCol = 'red';
    const audio = document.getElementById('bg-audio'), trackLabel = document.getElementById('track-name'), musicIcon = document.getElementById('music-icon');

    /* --- 2. 音樂播放系統 --- */
    function loadTrack(index) {
        audio.src = playlist[index].src;
        trackLabel.innerText = playlist[index].name;
    }
    loadTrack(currentTrackIndex);

    window.toggleMusic = function() {
        if (isPlaying) { audio.pause(); musicIcon.innerText = '🔇'; isPlaying = false; }
        else { audio.play().then(() => { musicIcon.innerText = '🎵'; isPlaying = true; }).catch(e => console.log("等待互動...")); }
    };
    window.startEverything = function() {
        window.nav('p2');
        if (!isPlaying) { audio.play().then(() => { musicIcon.innerText = '🎵'; isPlaying = true; }); }
    };
    window.nextTrack = function() { currentTrackIndex = (currentTrackIndex + 1) % playlist.length; loadTrack(currentTrackIndex); if (isPlaying) audio.play(); };
    window.prevTrack = function() { currentTrackIndex = (currentTrackIndex - 1 + playlist.length) % playlist.length; loadTrack(currentTrackIndex); if (isPlaying) audio.play(); };
    audio.onended = () => window.nextTrack();

    /* --- 3. 導覽功能 --- */
    window.nav = function(id) {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
        if(id === 'p2') window.changeTab(document.querySelectorAll('.mc-tab')[0], 'start');
        else startStars();
    };

    window.changeTab = function(btn, type) {
        document.querySelectorAll('.mc-tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        const panel = document.getElementById('main-panel');
        panel.innerHTML = ''; 

        if (type === 'start') {
            panel.innerHTML = `
                <div style="width:100%; height:100%; overflow-y:auto; padding:35px; color:#1a1a1a;">
                    <div style="border-bottom:4px solid #555; padding-bottom:15px; margin-bottom:25px;">
                        <h2 style="margin:0; font-size:26px; letter-spacing:2px;">🧩 創作起點</h2>
                        <span style="font-size:14px; color:#555; font-weight:bold;">跨越街頭與數位的創作實驗</span>
                    </div>
                    <div style="float: right; width: 38%; margin-left: 25px; margin-bottom: 20px; border: 5px solid #000; background:#000;">
                        <img src="art.jpg" style="width:100%; display:block;" onerror="this.src='https://via.placeholder.com/300'">
                    </div>
                    <div style="font-size:16px; line-height:1.9; text-align:justify;">
                        <p>在過去的創作經驗中，我長期接觸<b>街頭塗鴉與音樂製作</b>，這些創作形式具有強烈的個人風格與即時性，但也存在著難以保存與延伸的限制。因此，我開始思考：是否能透過數位媒介與 AI 技術，讓這些創作突破原有的限制，轉化為更具互動性與延展性的形式。</p>
                        <p>在本次實作中，我嘗試以<b>「網站」作為創作載體</b>，結合街頭塗鴉的視覺語言與數位互動設計，並引入 AI 作為創作過程中的輔助工具，探索藝術與科技之間的融合可能。</p>
                        <p>在製作過程中，我發現與 AI 的互動並非單向操作，而是一種需要<b>反覆溝通與調整的協作關係</b>。這也讓我重新理解「設計」不僅是視覺呈現，更包含邏輯與結構的建構。</p>
                        <p>AI 在此不僅是工具，更像是一位<b>引導者</b>，使我能在陌生領域中快速建立基礎。未來的創作不再只是單一媒材呈現，而是跨領域整合與<b>人機協作</b>的過程。</p>
                        <p style="background: #8B8B8B; color: #FFF; padding: 10px; border-left: 5px solid #333; margin-top: 30px; font-style: italic;">
                            " 本次創作不僅是作品的呈現，更是一個探索創作方式轉變的過程。 "
                        </p>
                    </div>
                    <div style="clear:both; height:20px;"></div>
                </div>`;
        } else if (type === 'paint') {
            // 🏆 修正處：完整包含四個場景按鈕
            panel.innerHTML = `
                <div class="paint-area">
                    <div class="paint-sidebar">
                        <div class="color-dot" style="background:red" onclick="currCol='red'"></div>
                        <div class="color-dot" style="background:lime" onclick="currCol='lime'"></div>
                        <div class="color-dot" style="background:blue" onclick="currCol='blue'"></div>
                        <div class="color-dot" style="background:yellow" onclick="currCol='yellow'"></div>
                        <div class="color-dot" style="background:white" onclick="currCol='white'"></div>
                        <div class="color-dot" style="background:black" onclick="currCol='black'"></div>
                        <hr style="width:100%; border:1px dashed #555;">
                        <div class="color-dot bg-btn" onclick="window.changeWall('wall.jpg')">磚牆</div>
                        <div class="color-dot bg-btn" onclick="window.changeWall('shutter.jpg')">鐵門</div>
                        <div class="color-dot bg-btn" onclick="window.changeWall('truck.jpg')">卡車</div>
                        <div class="color-dot bg-btn" onclick="window.changeWall('sticker.jpg')">貼紙</div>
                    </div>
                    <div class="wall-box" id="wall-box">
                        <img id="wall-img" src="wall.jpg" style="width:100%; height:100%; object-fit:cover; position:absolute;" onerror="this.style.background='#222'">
                        <canvas id="tab-canvas" style="position:absolute; top:0; left:0;"></canvas>
                    </div>
                    <button class="mc-button" style="position:absolute; bottom:20px; right:20px; width:100px; height:35px; font-size:12px; z-index:20;" onclick="window.clearCanvas()">清除全牆</button>
                </div>`;
            setTimeout(initCanvas, 100);
        } else if (type === 'works') {
            panel.innerHTML = '<div class="work-grid" id="grid-content"></div>';
            const g = document.getElementById('grid-content');
            for(let i=1; i<=14; i++) {
                g.innerHTML += `<div class="work-frame" onclick="window.showDetail(${i})"><div class="image-slot"><img src="i${i}.jpg" onerror="this.src='https://via.placeholder.com/150'"></div><div class="work-label">作品 ${i}</div></div>`;
            }
        } else {
            panel.innerHTML = `<div style="padding:30px; color:#000;"><h2>${type === 'process' ? '🛠️ 歷程記錄' : '🚀 未來發展'}</h2><p>內容載入中...</p></div>`;
        }
    };

    /* --- 4. 噴漆引擎 --- */
    function initCanvas() {
        const c = document.getElementById('tab-canvas'), b = document.getElementById('wall-box');
        if(!c || !b) return;
        const ctx = c.getContext('2d');
        c.width = b.offsetWidth; c.height = b.offsetHeight;
        const spray = (x, y) => {
            const density = 150, radius = 25;
            ctx.fillStyle = currCol;
            for (let i = 0; i < density; i++) {
                const r = Math.random() * radius, angle = Math.random() * Math.PI * 2;
                const offsetX = r * Math.cos(angle), offsetY = r * Math.sin(angle);
                const opacity = Math.pow((radius - r) / radius, 4); 
                if (opacity > 0.02) {
                    ctx.globalAlpha = opacity;
                    ctx.beginPath(); ctx.arc(x + offsetX, y + offsetY, Math.random() * 1.5, 0, Math.PI * 2); ctx.fill();
                }
            }
            ctx.globalAlpha = 1.0;
        };
        const handle = (e) => { const r = c.getBoundingClientRect(); spray((e.clientX || e.touches[0].clientX) - r.left, (e.clientY || e.touches[0].clientY) - r.top); };
        c.onmousedown = (e) => { painting = true; handle(e); };
        window.onmouseup = () => painting = false;
        c.onmousemove = (e) => { if(painting) requestAnimationFrame(() => handle(e)); };
        c.ontouchstart = (e) => { e.preventDefault(); painting = true; handle(e.touches[0]); };
        c.ontouchmove = (e) => { e.preventDefault(); handle(e.touches[0]); };
    }

    window.showDetail = (i) => {
        document.getElementById('det-title').innerText = `實作作品 ${i}`;
        document.getElementById('det-desc').innerText = `這是關於作品 ${i} 的詳細實作心得。`;
        document.getElementById('det-img').src = `i${i}.jpg`;
        document.getElementById('detail-overlay').style.display = 'flex';
    };

    window.changeWall = (src) => { document.getElementById('wall-img').src = src; };
    window.clearCanvas = () => { const c = document.getElementById('tab-canvas'); if(c) c.getContext('2d').clearRect(0,0,c.width,c.height); };

    /* --- 星星背景 --- */
    const starCanvas = document.getElementById('star-canvas'), starCtx = starCanvas.getContext('2d');
    function startStars() {
        starCanvas.width = window.innerWidth; starCanvas.height = window.innerHeight;
        const stars = Array.from({length:100}, () => ({ x:Math.random()*starCanvas.width, y:Math.random()*starCanvas.height, size:Math.random()*2, alpha:Math.random(), speed:Math.random()*0.05 }));
        function anim() {
            starCtx.clearRect(0,0,starCanvas.width,starCanvas.height);
            stars.forEach(s => { s.alpha += s.speed; if(s.alpha>1 || s.alpha<0) s.speed *= -1; starCtx.fillStyle=`rgba(255,255,255,${Math.abs(s.alpha)})`; starCtx.beginPath(); starCtx.arc(s.x, s.y, s.size, 0, Math.PI*2); starCtx.fill(); });
            requestAnimationFrame(anim);
        }
        anim();
    }
    document.addEventListener('DOMContentLoaded', () => { window.nav('p1'); });
</script>
</body>
</html>
