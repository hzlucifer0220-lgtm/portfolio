<style>
    /* --- P2 基礎佈局 --- */
    #p2 {
        background: rgba(0, 0, 0, 0.7) url('gui_bg.jpg') center/cover no-repeat;
        background-blend-mode: overlay; /* 讓背景有遊戲選單的變暗效果 */
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    /* 1. Back 按鈕 (左上角或右上角) */
    .btn-back-p1 {
        position: absolute;
        top: 20px;
        left: 20px;
        width: 120px;
    }

    /* 2. UI 主要介面 (3:2 比例) */
    .main-gui-wrapper {
        width: 75vw; /* 根據螢幕調整，保持 3:2 */
        height: 50vw; 
        max-height: 85vh;
        display: flex;
        flex-direction: column;
        position: relative;
    }

    /* 四個標籤按鈕 (位於介面上方) */
    .tabs-container {
        display: flex;
        gap: 4px;
        margin-left: 10px;
    }
    .mc-tab {
        width: 100px;
        height: 35px;
        font-size: 14px;
        border-bottom: none; /* 讓它看起來像連著下面 */
        z-index: 1;
    }
    .mc-tab.active {
        background-color: #C6C6C6; /* 啟動的分頁顏色較亮 */
        color: #000;
        outline: 3px solid #FFF;
        outline-offset: -5px;
        height: 40px; /* 稍微高一點點 */
        margin-top: -5px;
    }

    /* 主要內容面板 (滾動頁面) */
    .gui-panel {
        flex: 1;
        background-color: #C6C6C6; /* Minecraft 經典灰色面板 */
        border: 3px solid #000;
        box-shadow: inset 3px 3px 0px #FFF, inset -3px -3px 0px #555;
        overflow-y: auto; /* 滾動式頁面 */
        padding: 20px;
        image-rendering: pixelated;
    }

    /* 自定義滾動條 (Minecraft 風格) */
    .gui-panel::-webkit-scrollbar { width: 12px; }
    .gui-panel::-webkit-scrollbar-track { background: #333; border: 2px solid #000; }
    .gui-panel::-webkit-scrollbar-thumb { background: #8B8B8B; border: 2px solid #FFF; }

    /* 3. 作品集展示頁面 (一列三個) */
    .work-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr); /* 嚴格一列三個 */
        gap: 15px;
    }

    /* 展示框 (3:4 比例) */
    .item-frame {
        aspect-ratio: 3 / 4;
        background-color: #8B8B8B;
        border: 2px solid #373737;
        box-shadow: inset 3px 3px 0px #555, inset -3px -3px 0px #DDD; /* 內凹感 */
        display: flex;
        flex-direction: column;
        padding: 10px;
        cursor: pointer;
    }
    .item-frame:hover {
        outline: 3px solid #FFF;
        background-color: #9D9D9D;
    }

    /* 展示框內的圖片空白處 (正方形) */
    .img-slot {
        width: 100%;
        aspect-ratio: 1 / 1; /* 正方形 */
        background-color: #333; /* 暗色背景 */
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        border: 2px solid #000;
    }
    .img-slot img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain; /* 自動調整尺寸至空白處，邊緣留空 */
    }

    .item-title {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        font-size: 14px;
        color: #FFF;
        text-shadow: 1px 1px #000;
        margin-top: 5px;
    }

    /* 4. 詳細視窗 (1:2 比例) */
    #detail-popup {
        position: fixed;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 35vh; /* 寬度根據高度聯動以維持 1:2 */
        height: 70vh;
        background-color: #C6C6C6;
        border: 4px solid #000;
        box-shadow: 10px 10px 0px rgba(0,0,0,0.5);
        z-index: 1000;
        padding: 15px;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .detail-img-box { width: 100%; aspect-ratio: 1/1; background: #000; display: flex; align-items: center; justify-content: center; border: 2px solid #555; }
    .detail-img-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .detail-desc { flex: 1; overflow-y: auto; background: rgba(0,0,0,0.1); padding: 5px; font-size: 14px; color: #333; }
</style>

<div id="p2" class="screen hidden">
    <button class="mc-button btn-back-p1" onclick="nav('p1')">BACK</button>

    <div class="main-gui-wrapper">
        <div class="tabs-container">
            <button class="mc-button mc-tab active" onclick="switchTab(this, 'tab1')">WORKS</button>
            <button class="mc-button mc-tab" onclick="switchTab(this, 'tab2')">INFO</button>
            <button class="mc-button mc-tab" onclick="switchTab(this, 'tab3')">LOG</button>
            <button class="mc-button mc-tab" onclick="switchTab(this, 'tab4')">FUTURE</button>
        </div>
        
        <div class="gui-panel">
            <div id="gallery-grid" class="work-grid">
                </div>
        </div>
    </div>
</div>

<div id="detail-popup" class="hidden">
    <div class="detail-img-box"><img id="pop-img" src=""></div>
    <h3 id="pop-title" style="margin:0; color:#000;">TITLE</h3>
    <div id="pop-desc" class="detail-desc">DESCRIPTION...</div>
    <button class="mc-button" style="width:100%;" onclick="closePopup()">CLOSE</button>
</div>

<script>
    // 模擬 15 個展示框
    function renderGallery() {
        const grid = document.getElementById('gallery-grid');
        grid.innerHTML = '';
        for (let i = 1; i <= 15; i++) {
            grid.innerHTML += `
                <div class="item-frame" onclick="openPopup('作品 ${i}', 'work${i}.jpg', '這是第 ${i} 個作品的詳細說明。')">
                    <div class="img-slot">
                        <img src="work${i}.jpg" onerror="this.src='https://via.placeholder.com/150?text=IMG'">
                    </div>
                    <div class="item-title">作品 ${i}</div>
                </div>
            `;
        }
    }

    function openPopup(title, img, desc) {
        document.getElementById('pop-title').innerText = title;
        document.getElementById('pop-img').src = img;
        document.getElementById('pop-desc').innerText = desc;
        document.getElementById('detail-popup').classList.remove('hidden');
    }

    function closePopup() {
        document.getElementById('detail-popup').classList.add('hidden');
    }

    // 初始化調用
    renderGallery();
</script>
