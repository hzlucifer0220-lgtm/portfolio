<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學習成果實作檔案庫 v18.5</title>
    <style>
        :root {
            --mc-gray: #C6C6C6; --mc-dark: #555555; --mc-light: #FFFFFF; --mc-shadow: #373737; --mc-accent: #E67E22;
        }

        /* 基礎設置 - 確保不跑版 */
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: '微軟正黑體', sans-serif; }
        .screen { width: 100%; height: 100%; display: none; position: relative; }

        /* [🔒 鎖定] v16 經典按鈕風格 */
        .mc-button {
            background: #707070; border: 3px solid #000; color: #E0E0E0; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset 3px 3px 0px var(--mc-light), inset -3px -3px 0px var(--mc-shadow);
            font-weight: bold; text-shadow: 2px 2px #3F3F3F; user-select: none;
        }
        .mc-button:hover { background: #8B8B8B; color: #FFF; outline: 3px solid #FFF; outline-offset: -8px; }
        .mc-button:active { transform: scale(0.98); }

        /* [🔒 鎖定] P1 封面與音樂列 */
        #p1 { background: url('cover_art.jpg') center/cover no-repeat; display: flex; align-items: center; justify-content: center; }
        .global-music-bar { position: fixed; top: 15px; right: 15px; display: flex; flex-direction: row-reverse; gap: 5px; z-index: 2000; }
        .player-btn { width: 35px; height: 35px; }
        .marquee-container { width: 180px; height: 35px; background: rgba(0,0,0,0.8); border: 2px solid #555; overflow: hidden; position: relative; }
        .marquee-text { position: absolute; white-space: nowrap; color: #FFF; font-size: 12px; line-height: 31px; animation: marquee 10s linear infinite; }
        @keyframes marquee { 0% { left: 100%; } 100% { left: -150%; } }

        /* [🔒 鎖定] v16 GUI 結構 */
        #p2 { background: rgba(0,0,0,0.7) url('gui_bg.jpg') center/cover no-repeat; background-blend-mode: overlay; align-items: center; justify-content: center; }
        .gui-container { width: 90vw; height: 85vh; display: flex; flex-direction: column; margin-top: 40px; }
        .tabs-row { display: flex; gap: 4px; padding-left: 10px; }
        .mc-tab { width: 110px; height: 40px; border-bottom: none; border-radius: 5px 5px 0 0; }
        .mc-tab.active { background: var(--mc-gray); color: #333; height: 48px; margin-top: -8px; text-shadow: none; z-index: 5; }
        .gui-panel { flex: 1; background: var(--mc-gray); border: 4px solid #000; box-shadow: inset 4px 4px 0 var(--mc-light), inset -4px -4px 0 var(--mc-dark); position: relative; overflow: hidden; }

        /* [✨ 達成目標] 作品集 1/4 美編 */
        .work-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 25px; height: 100%; overflow-y: auto; }
        .work-frame { position: relative; aspect-ratio: 1/1; background: #000; border: 4px solid #000; overflow: hidden; cursor: pointer; box-shadow: 4px 4px 0 rgba(0,0,0,0.3); }
        .image-slot { width: 100%; height: 100%; }
        .image-slot img { width: 100%; height: 100%; object-fit: cover; }
        .work-label { 
            position: absolute; bottom: 0; left: 0; width: 100%; height: 28%; 
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(5px); border-top: 2px solid var(--mc-accent);
            display: flex; flex-direction: column; justify-content: center; padding: 0 12px; transition: 0.3s;
        }
        .work-frame:hover .work-label { height: 35%; background: rgba(230, 126, 34, 0.9); }
        .work-title-text { font-size: 14px; color: #FFF; font-weight: bold; margin: 0; text-shadow: 2px 2px #000; }
        .work-tag-text { font-size: 10px; color: var(--mc-accent); font-weight: bold; margin-bottom: 2px; }

        /* [✨ 達成目標] 彈窗視窗優化 */
        #detail-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 3000; display: none; align-items: center; justify-content: center; cursor: pointer; }
        #detail-view { width: 85vw; height: 80vh; background: #EEE; border: 6px solid #000; display: flex; cursor: default; }
        .det-left { flex: 1.2; background: #000; display: flex; align-items: center; justify-content: center; padding: 20px; border-right: 4px solid #000; }
        .det-left img { max-width: 100%; max-height: 100%; object-fit: contain; } /* 修正縮放 */
        .det-right { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .det-header { background: #333; color: #FFF; padding: 20px 25px; }
        #det-desc-container { flex: 1; overflow-y: auto; padding: 25px; background: #F5F5F5; display: flex; flex-direction: column; }

        /* [🔒 鎖定] 互動塗鴉區域 */
        .paint-sidebar { width: 90px; background: rgba(0,0,0,0.8); padding: 10px; display: flex; flex-direction: column; gap: 8px; border-right: 3px solid #000; }
        .color-dot { width: 100%; aspect-ratio: 1/1; border: 2px solid #FFF; cursor: pointer; }
        .wall-box { flex: 1; position: relative; background: #222; margin: 10px; border: 3px solid #000; overflow: hidden; }
        #tab-canvas { position: absolute; top: 0; left: 0; z-index: 5; }
    </style>
</head>
<body>

    <div class="global-music-bar">
        <button class="mc-button player-btn" onclick="window.toggleMusic()"><span id="music-icon">🔇</span></button>
        <button class="mc-button player-btn" onclick="window.nextTrack()"> > </button>
        <div class="marquee-container"><div id="track-name" class="marquee-text">Waiting...</div></div>
        <button class="mc-button player-btn" onclick="window.prevTrack()"> < </button>
    </div>
    <audio id="bg-audio" preload="auto"></audio>

    <div id="p1" class="screen">
        <canvas id="star-canvas" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none;"></canvas>
        <button class="mc-button" style="width: 220px; height: 65px; font-size: 26px;" onclick="window.startEverything()">開 始</button>
    </div>

    <div id="p2" class="screen">
        <button class="mc-button" style="position:absolute; top:10px; left:10px; width:80px; height:35px; font-size:12px; z-index: 1000;" onclick="window.nav('p1')">返回</button>
        <div class="gui-container">
            <div class="tabs-row">
                <button class="mc-button mc-tab active" onclick="window.changeTab(this, 'start')">創作起點</button>
                <button class="mc-button mc-tab" onclick="window.changeTab(this, 'paint')">互動塗鴉</button>
                <button class="mc-button mc-tab" onclick="window.changeTab(this, 'works')">作品集</button>
                <button class="mc-button mc-tab" onclick="window.changeTab(this, 'process')">歷程記錄</button>
                <button class="mc-button mc-tab" onclick="window.changeTab(this, 'future')">未來發展</button>
            </div>
            <div class="gui-panel" id="main-panel"></div>
        </div>
    </div>

    <div id="detail-overlay" onclick="this.style.display='none'">
        <div id="detail-view" onclick="event.stopPropagation()">
            <div class="det-left"><img id="det-img" src=""></div>
            <div class="det-right">
                <div class="det-header">
                    <div id="det-tag" style="background:var(--mc-accent); padding:2px 8px; font-size:11px; font-weight:bold; display:inline-block; margin-bottom:5px;">TAG</div>
                    <h3 id="det-title" style="margin:0; font-size:22px;">Title</h3>
                </div>
                <div id="det-desc-container">
                    <div id="det-desc" style="flex:1;"></div>
                    <div style="margin-top:30px; padding-top:15px; border-top:1px solid #DDD; color:#999; font-size:12px; text-align:center;">[ 點擊任何空白區域關閉視窗 ]</div>
                </div>
            </div>
        </div>
    </div>

<script>
    // [資料庫與變數 - 鎖定]
    let currCol = 'red', painting = false, isPlaying = false, currentTrackIndex = 0;
    const audio = document.getElementById('bg-audio'), trackLabel = document.getElementById('track-name'), musicIcon = document.getElementById('music-icon');
    const playlist = [{ name: "Now Playing: late night", src: "late night.mp3" }, { name: "Now Playing: made it through", src: "made it through.mp3" }, { name: "Now Playing: M.I.A", src: "M.I.A.mp3" }];
    
    // 作品集文字資料庫 (包含 3, 4, 5 鎖定)
    const worksData = {
        1: { title: "個人風格帽踢", tag: "服飾設計", desc: "本作品以「個人風格建構」為核心，嘗試創作一件有別於市面既有樣式的服飾設計...[略]" },
        2: { title: "班服設計藝術", tag: "班級服飾", desc: "本作品以班級服飾為創作載體，核心概念圍繞「和」字展開...[略]" },
        3: { title: "AI 藝術創意封面設計", tag: "音樂專輯封面", desc: "本作品為一張結合 AI 圖像生成技術之音樂專輯封面設計...\n\n<div style='text-align:center; margin:20px 0; background:#FFF; padding:15px; border:4px solid #000;'><img src='qr_code.jpg' style='width:120px;' onerror='this.src=\"https://via.placeholder.com/120?text=QR+CODE\"'><div style='font-size:12px; color:#333; margin-top:5px; font-weight:bold;'>掃描 QR Code 聆聽專輯曲目</div></div>" },
        4: { title: "字體藝術探索", tag: "哥德式字體", desc: "本作品為一組以「Island」為主題的哥德式字體手繪草稿..." },
        5: { title: "線條與色彩實驗 I", tag: "街頭塗鴉 Tag", desc: "本作品為兩個街頭塗鴉 Tag（Selfish 與 Caught）的手繪設計..." },
        // ...其餘作品標題同步帶入...
        6: { title: "線條與色彩實驗 II", tag: "風格融合", desc: "..." }, 7: { title: "線條與色彩實驗 III", tag: "立體造型", desc: "..." },
        8: { title: "永恆交響", tag: "雙語設計", desc: "..." }, 9: { title: "手握夢想", tag: "插畫動態", desc: "..." },
        10: { title: "線條與色彩實驗 IV", tag: "混搭風格", desc: "..." }, 11: { title: "線條與色彩實驗 V", tag: "Bubble 練習", desc: "..." },
        12: { title: "夕陽下的故事", tag: "城市背景", desc: "..." }, 13: { title: "財富交錯", tag: "概念設計", desc: "..." },
        14: { title: "線條與節奏", tag: "視覺韻律", desc: "..." }
    };

    // [導航與功能 - 鎖定]
    window.nav = (id) => { document.querySelectorAll('.screen').forEach(s => s.style.display = 'none'); document.getElementById(id).style.display = 'flex'; if(id==='p2') window.changeTab(document.querySelector('.mc-tab'), 'start'); else startStars(); };
    window.startEverything = () => { window.nav('p2'); if(!isPlaying) window.toggleMusic(); };
    window.toggleMusic = () => { if(isPlaying){ audio.pause(); musicIcon.innerText='🔇'; isPlaying=false; }else{ audio.play(); musicIcon.innerText='🎵'; isPlaying=true; } };
    window.nextTrack = () => { currentTrackIndex=(currentTrackIndex+1)%playlist.length; updateAudio(); };
    window.prevTrack = () => { currentTrackIndex=(currentTrackIndex-1+playlist.length)%playlist.length; updateAudio(); };
    function updateAudio(){ audio.src=playlist[currentTrackIndex].src; trackLabel.innerText=playlist[currentTrackIndex].name; if(isPlaying) audio.play(); }

    // [✨ 更新] 分頁邏輯：創作起點、塗鴉、作品集
    window.changeTab = (btn, type) => {
        document.querySelectorAll('.mc-tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        const panel = document.getElementById('main-panel');
        panel.innerHTML = '';

        if(type === 'start') {
            panel.innerHTML = `
            <div style="width:100%; height:100%; overflow-y:auto; padding:40px; color:#222; background:#F0F0F0;">
                <h2 style="border-bottom:5px solid #333; padding-bottom:10px; margin-bottom:20px;">🧩 創作起點</h2>
                <div style="float:right; width:40%; margin-left:25px; border:6px solid #000;"><img src="art.jpg" style="width:100%; display:block;" onerror="this.src='https://via.placeholder.com/400'"></div>
                <div style="font-size:17px; line-height:1.8; text-align:justify;">
                    <p>在過去的創作經驗中，我長期接觸<b>街頭塗鴉與音樂製作</b>...</p>
                    <p>在本次實作中，我嘗試以<b>「網站」作為創作載體</b>...</p>
                </div>
                <div style="clear:both; margin-top:30px; padding:20px; background:#333; color:#FFF; border-left:10px solid var(--mc-accent);">
                    " 本次創作不僅是作品的呈現，更是一個探索創作方式轉變的過程，實踐「在生活中展現自我風格」的初衷。 "
                </div>
            </div>`;
        } else if(type === 'paint') {
            panel.innerHTML = `
            <div style="display:flex; width:100%; height:100%;">
                <div class="paint-sidebar">
                    <div class="color-dot" style="background:red" onclick="currCol='red'"></div>
                    <div class="color-dot" style="background:lime" onclick="currCol='lime'"></div>
                    <div class="color-dot" style="background:white" onclick="currCol='white'"></div>
                    <div class="color-dot" style="background:black" onclick="currCol='black'"></div>
                    <hr style="width:100%; border-color:#555;">
                    <button class="mc-button" style="font-size:10px; padding:5px 0;" onclick="window.changeWall('wall.jpg')">磚牆</button>
                    <button class="mc-button" style="font-size:10px; padding:5px 0;" onclick="window.changeWall('shutter.jpg')">鐵門</button>
                </div>
                <div class="wall-box" id="wall-box"><img id="wall-img" src="wall.jpg" style="width:100%; height:100%; object-fit:cover; position:absolute;"><canvas id="tab-canvas"></canvas></div>
                <button class="mc-button" style="position:absolute; bottom:20px; right:20px; width:100px; height:40px;" onclick="window.clearCanvas()">清除全牆</button>
            </div>`;
            setTimeout(initCanvas, 100);
        } else if(type === 'works') {
            panel.innerHTML = '<div class="work-grid" id="grid-content"></div>';
            for(let i=1; i<=14; i++){
                const d = worksData[i];
                document.getElementById('grid-content').innerHTML += `
                <div class="work-frame" onclick="window.showDetail(${i})">
                    <div class="image-slot"><img src="i${i}.jpg" onerror="this.src='https://via.placeholder.com/300'"></div>
                    <div class="work-label"><div class="work-tag-text">${d.tag}</div><div class="work-title-text">${d.title}</div></div>
                </div>`;
            }
        }
    };

    // [彈窗功能 - 達成目標]
    window.showDetail = (i) => {
        const d = worksData[i];
        document.getElementById('det-title').innerText = d.title;
        document.getElementById('det-tag').innerText = d.tag;
        document.getElementById('det-desc').innerHTML = d.desc;
        document.getElementById('det-img').src = `i${i}.jpg`;
        document.getElementById('detail-overlay').style.display = 'flex';
    };

    // [噴漆與星星 - 鎖定]
    function initCanvas(){
        const c=document.getElementById('tab-canvas'), b=document.getElementById('wall-box'); if(!c)return;
        c.width=b.offsetWidth; c.height=b.offsetHeight; const ctx=c.getContext('2d');
        const spray=(x,y)=>{ ctx.fillStyle=currCol; for(let i=0;i<100;i++){ const r=Math.random()*20, a=Math.random()*Math.PI*2; ctx.globalAlpha=Math.pow((20-r)/20,3); ctx.beginPath(); ctx.arc(x+r*Math.cos(a),y+r*Math.sin(a),Math.random()*1.5,0,Math.PI*2); ctx.fill(); } ctx.globalAlpha=1; };
        c.onmousedown=()=>painting=true; window.onmouseup=()=>painting=false;
        c.onmousemove=(e)=>{ if(painting){ const r=c.getBoundingClientRect(); spray(e.clientX-r.left, e.clientY-r.top); } };
    }
    window.changeWall = (s) => document.getElementById('wall-img').src = s;
    window.clearCanvas = () => { const c=document.getElementById('tab-canvas'); c.getContext('2d').clearRect(0,0,c.width,c.height); };
    
    function startStars(){
        const cvs=document.getElementById('star-canvas'), ctx=cvs.getContext('2d');
        cvs.width=window.innerWidth; cvs.height=window.innerHeight;
        const s=Array.from({length:80},()=>({x:Math.random()*cvs.width,y:Math.random()*cvs.height,a:Math.random(),v:Math.random()*0.02}));
        function draw(){ ctx.clearRect(0,0,cvs.width,cvs.height); s.forEach(p=>{ p.a+=p.v; if(p.a>1||p.a<0)p.v*=-1; ctx.fillStyle=`rgba(255,255,255,${Math.abs(p.a)})`; ctx.beginPath(); ctx.arc(p.x,p.y,1,0,Math.PI*2); ctx.fill(); }); requestAnimationFrame(draw); }
        draw();
    }
    window.onload = () => { window.nav('p1'); audio.src=playlist[0].src; trackLabel.innerText=playlist[0].name; };
</script>
</body>
</html>
