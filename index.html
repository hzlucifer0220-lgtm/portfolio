<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio System - Direct Access</title>
    <style>
        :root {
            --accent: #00ffcc;
            --bg-dark: #0a0a0a;
            --panel-bg: rgba(15, 15, 15, 0.9);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; color: #fff; overflow: hidden;
            font-family: 'Segoe UI', '微軟正黑體', sans-serif;
        }

        .screen {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }

        .hidden { display: none !important; opacity: 0; }

        /* 背景 */
        #p1 { background: url('cover_art.jpg') center/cover no-repeat; }
        #p2 { background: url('gui_bg.jpg') center/cover no-repeat; }

        /* C1 控制台 (55% 高度) */
        .console-container {
            width: 75%; height: 55%; background: var(--panel-bg);
            border: 1px solid var(--accent); display: flex; flex-direction: column;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
        }
        .tabs { display: flex; border-bottom: 1px solid #333; background: #111; }
        .tab-btn { 
            flex: 1; padding: 12px; background: none; border: none; color: #666; 
            cursor: pointer; transition: 0.3s; font-weight: bold;
        }
        .tab-btn.active { color: var(--accent); background: rgba(0, 255, 204, 0.1); border-bottom: 2px solid var(--accent); }
        .tab-scroll-area { flex: 1; overflow-y: auto; padding: 20px; }

        /* M1 播放器 (3:1) */
        .music-player {
            position: fixed; bottom: 20px; left: 20px;
            width: 18vw; aspect-ratio: 3 / 1;
            background: rgba(0, 0, 0, 0.85); border: 1px solid #333;
            display: flex; padding: 10px; z-index: 1000;
        }
        .m1-left { width: 30%; display: flex; align-items: center; justify-content: center; }
        .disk-container { width: 85%; aspect-ratio: 1/1; border-radius: 50%; overflow: hidden; border: 2px solid #333; }
        .rotating { animation: spin 4s linear infinite; }
        
        .m1-right { width: 70%; padding-left: 12px; display: flex; flex-direction: column; justify-content: space-between; }
        .marquee { overflow: hidden; white-space: nowrap; font-size: 11px; color: var(--accent); height: 15px; }
        .marquee span { display: inline-block; padding-left: 100%; animation: marquee 8s linear infinite; }
        .m-btn { background: none; border: none; color: #fff; cursor: pointer; font-size: 14px; }
        #seek-bar { width: 100%; height: 3px; accent-color: var(--accent); cursor: pointer; }
        .time-text { font-size: 9px; color: #888; text-align: right; }

        .btn-start { padding: 15px 40px; background: rgba(0,0,0,0.5); border: 1px solid var(--accent); color: var(--accent); cursor: pointer; font-size: 18px; letter-spacing: 2px; }
        .btn-start:hover { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <div id="p1" class="screen">
        <img src="tittle.jpg" style="max-width: 450px; margin-bottom: 40px;">
        <button id="b1" class="btn-start">START SYSTEM</button>
    </div>

    <div id="p2" class="screen hidden">
        <div class="console-container">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab(event, 'tab1')">創作理念</button>
                <button class="tab-btn" onclick="switchTab(event, 'tab2')">作品集</button>
                <button class="tab-btn" onclick="switchTab(event, 'tab3')">創作歷程</button>
                <button class="tab-btn" onclick="switchTab(event, 'tab4')">未來展望</button>
            </div>
            <div id="tab-content" class="tab-scroll-area"></div>
        </div>
        <button id="b-add" class="hidden" style="margin-top:20px; color:var(--accent); background:none; border:1px solid var(--accent); padding:5px 15px; cursor:pointer;">+ ADD WORK</button>
    </div>

    <div id="m1" class="music-player">
        <div class="m1-left">
            <div class="disk-container"><img src="dj.jpg" id="dj-disk" style="width:100%;"></div>
        </div>
        <div class="m1-right">
            <div class="marquee"><span id="track-name">Initializing...</span></div>
            <div class="m1-row-2">
                <button class="m-btn" onclick="changeTrack(-1)">◀</button>
                <button class="m-btn" id="m-play">PLAY</button>
                <button class="m-btn" onclick="changeTrack(1)">▶</button>
            </div>
            <div>
                <input type="range" id="seek-bar" value="0">
                <div id="time-display" class="time-text">00:00 / 00:00</div>
            </div>
        </div>
    </div>

    <audio id="bg-music" loop></audio>

    <script>
        const audio = document.getElementById('bg-music');
        const playlist = [
            { name: "M.I.A1", src: "M.I.A1.mp3" },
            { name: "made it through2", src: "made it through2.mp3" },
            { name: "late night3", src: "late night3.mp3" }
        ];
        let currentIdx = 0;
        let adminMode = false;
        let keys = "";

        function initPlayer() {
            audio.src = playlist[currentIdx].src;
            document.getElementById('track-name').innerText = playlist[currentIdx].name + " - READY";
        }

        function show(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            const target = document.getElementById(id);
            target.classList.remove('hidden');
            setTimeout(() => target.style.opacity = 1, 10);
        }

        function updateUI(playing) {
            const disk = document.getElementById('dj-disk');
            const btn = document.getElementById('m-play');
            if(playing) {
                disk.classList.add('rotating');
                btn.innerText = "PAUSE";
                document.getElementById('track-name').innerText = playlist[currentIdx].name + " - PLAYING";
            } else {
                disk.classList.remove('rotating');
                btn.innerText = "PLAY";
            }
        }

        function changeTrack(dir) {
            currentIdx = (currentIdx + dir + playlist.length) % playlist.length;
            audio.src = playlist[currentIdx].src;
            audio.play().then(() => updateUI(true)).catch(() => {});
        }

        document.getElementById('m-play').onclick = (e) => {
            e.stopPropagation();
            if(audio.paused) { audio.play().then(() => updateUI(true)); }
            else { audio.pause(); updateUI(false); }
        };

        audio.ontimeupdate = () => {
            if(!audio.duration) return;
            document.getElementById('seek-bar').value = (audio.currentTime / audio.duration) * 100;
            const cur = Math.floor(audio.currentTime);
            const dur = Math.floor(audio.duration);
            document.getElementById('time-display').innerText = `${Math.floor(cur/60)}:${(cur%60).toString().padStart(2,'0')} / ${Math.floor(dur/60)}:${(dur%60).toString().padStart(2,'0')}`;
        };

        document.getElementById('seek-bar').oninput = (e) => {
            audio.currentTime = (e.target.value / 100) * audio.duration;
        };

        function switchTab(e, id) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if(e) e.currentTarget.classList.add('active');
            const area = document.getElementById('tab-content');
            area.scrollTop = 0;
            if(id === 'tab2') {
                area.innerHTML = '<p style="text-align:center; color:#444; margin-top:40px;">目前暫無作品</p>';
                if(adminMode) document.getElementById('b-add').classList.remove('hidden');
            } else {
                area.innerHTML = `<div style="padding:10px;"><h3>${id.toUpperCase()}</h3><p>此分頁內容準備中...</p></div>`;
                document.getElementById('b-add').classList.add('hidden');
            }
        }

        // 管理員解鎖
        document.addEventListener('keydown', (e) => {
            keys += e.key.toLowerCase();
            if(keys.includes("admin")) {
                adminMode = true;
                alert("ADMIN MODE UNLOCKED");
                keys = "";
                if(!document.getElementById('p2').classList.contains('hidden')) {
                    const activeTab = document.querySelector('.tab-btn.active').innerText;
                    if(activeTab === '作品集') document.getElementById('b-add').classList.remove('hidden');
                }
            }
            if(keys.length > 10) keys = "";
        });

        // P1 START 按鈕：直接跳轉 P2 (不經過 L2)
        document.getElementById('b1').onclick = () => {
            show('p2');
            switchTab(null, 'tab1');
        };

        // 頁面加載時執行
        window.onload = () => {
            initPlayer();
            // 監聽第一次點擊以啟動音樂
            document.addEventListener('click', function unlock() {
                if(audio.paused) {
                    audio.play().then(() => updateUI(true)).catch(() => {});
                }
                document.removeEventListener('click', unlock);
            }, { once: true });
        };
    </script>
</body>
</html>
