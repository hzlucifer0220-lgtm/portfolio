<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學習成果實作檔案庫 v15.0 - Full Text Edition</title>
    <style>
        :root {
            --mc-gray: #C6C6C6;
            --mc-dark: #555555;
            --mc-light: #FFFFFF;
            --mc-shadow: #373737;
        }

        /* 基礎重置 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: #FFF; 
            font-family: 'Segoe UI', '微軟正黑體', sans-serif;
            overflow: hidden; 
        }

        /* Minecraft 核心按鈕 */
        .mc-button {
            background: #707070; border: 3px solid #000; color: #E0E0E0; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset 3px 3px 0px var(--mc-light), inset -3px -3px 0px var(--mc-shadow);
            font-weight: bold; text-shadow: 2px 2px #3F3F3F; transition: transform 0.05s;
            user-select: none; position: relative; z-index: 10;
        }
        .mc-button:hover { background: #8B8B8B; color: #FFF; outline: 3px solid #FFF; outline-offset: -8px; }
        .mc-button:active { transform: scale(0.95); }

        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; }

        /* 全域音樂播放器 */
        .global-music-bar {
            position: fixed; top: 15px; right: 15px;
            width: 15vw; min-width: 250px; height: 40px;
            display: flex; flex-direction: row-reverse; 
            align-items: center; gap: 5px; z-index: 2000;
        }
        .player-btn { width: 35px; height: 35px; font-size: 14px; flex-shrink: 0; }
        .marquee-container { 
            flex: 1; height: 30px; background: rgba(0, 0, 0, 0.8); border: 2px solid #555; 
            overflow: hidden; position: relative; display: flex; align-items: center; 
        }
        .marquee-text { 
            position: absolute; white-space: nowrap; color: #FFFFFF; 
            font-family: monospace; font-size: 12px; padding-left: 100%; animation: marquee 10s linear infinite; 
        }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-250%); } }

        /* P1: 封面 */
        #p1 { background: url('cover_art.jpg') center/cover no-repeat; display: flex; position: relative; flex-direction: column; justify-content: flex-end; }
        #star-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }

        /* P2: 主面板 */
        #p2 { background: rgba(0,0,0,0.7) url('gui_bg.jpg') center/cover no-repeat; background-blend-mode: overlay; }
        .gui-container { width: 90vw; height: 60vw; max-height: 85vh; display: flex; flex-direction: column; margin-top: 65px; }
        .tabs-row { display: flex; gap: 4px; padding-left: 10px; }
        .mc-tab { width: 110px; height: 40px; font-size: 13px; border-bottom: none; border-radius: 5px 5px 0 0; margin-top: 8px; }
        .mc-tab.active { background: var(--mc-gray); color: #333; height: 48px; margin-top: 0; z-index: 2; text-shadow: none; box-shadow: inset 3px 3px 0 var(--mc-light); }
        .gui-panel { flex: 1; background: var(--mc-gray); border: 4px solid #000; box-shadow: inset 4px 4px 0 var(--mc-light), inset -4px -4px 0 var(--mc-dark); position: relative; overflow: hidden; }

        /* 噴漆牆區域 */
        .paint-area { width: 100%; height: 100%; display: flex; position: relative; }
        .wall-box { flex: 1; margin: 20px 20px 20px 110px; border: 4px solid #000; background: #333; position: relative; overflow: hidden; }
        #tab-canvas { width: 100%; height: 100%; cursor: crosshair; }
        .paint-sidebar { position: absolute; left: 15px; top: 20px; width: 85px; bottom: 20px; display: flex; flex-direction: column; gap: 5px; padding: 10px; background: rgba(0,0,0,0.8); border: 2px solid #FFF; overflow-y: auto; z-index: 10; }
        .color-dot { width: 100%; aspect-ratio: 1/1; border: 2px solid #FFF; cursor: pointer; flex-shrink: 0; }
        .bg-btn { background: #444; color: white; font-size: 10px; display: flex; align-items: center; justify-content: center; text-align: center; }

        /* 作品集網格 */
        .work-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 20px; height: 100%; overflow-y: auto; }
        .work-frame { aspect-ratio: 3/4; background: #8B8B8B; border: 3px solid #000; padding: 10px; cursor: pointer; transition: transform 0.2s; }
        .work-frame:hover { transform: translateY(-5px); background: #9D9D9D; }
        .image-slot { width: 100%; aspect-ratio: 1/1; background: #000; border: 2px solid #333; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .image-slot img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .work-label { height: 30px; display: flex; align-items: center; justify-content: center; font-size: 13px; text-shadow: 1px 1px #000; font-weight: bold; }
        
        /* 🏆 專業彈窗樣式 */
        #detail-overlay { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.92); z-index: 3000; 
            display: none; align-items: center; justify-content: center; 
            cursor: pointer;
        }
        #detail-view { 
            width: 85vw; max-width: 1300px; aspect-ratio: 2/1; 
            background: var(--mc-gray); border: 6px solid #000; 
            display: flex; position: relative;
            box-shadow: 20px 20px 0px rgba(0,0,0,0.6); cursor: default;
        }

        .det-left { flex: 1.1; background: #000; border-right: 4px solid #000; display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 20px; }
        #det-img { max-width: 100%; max-height: 100%; object-fit: contain; border: 2px solid #444; }

        .det-right { flex: 1; display: flex; flex-direction: column; padding: 35px; color: #1a1a1a; overflow: hidden; }
        #det-title { margin: 0 0 10px 0; font-size: 26px; font-weight: bold; border-bottom: 4px solid #000; padding-bottom: 8px; letter-spacing: 1px; }
        #det-tag { display: inline-block; background: #333; color: #FFF; padding: 4px 10px; font-size: 12px; margin-bottom: 20px; font-family: monospace; align-self: flex-start; }
        
        #det-desc-container { flex: 1; overflow-y: auto; padding-right: 15px; }
        /* 滾動條美化 */
        #det-desc-container::-webkit-scrollbar { width: 10px; }
        #det-desc-container::-webkit-scrollbar-track { background: #AAA; border: 1px solid #888; }
        #det-desc-container::-webkit-scrollbar-thumb { background: #555; border: 2px solid #AAA; }
        
        #det-desc { font-size: 15.5px; line-height: 1.85; text-align: justify; white-space: pre-line; } /* pre-line 保留換行 */

        .close-tip { position: absolute; bottom: -45px; left: 0; width: 100%; text-align: center; color: #FFF; background: rgba(255,255,255,0.15); font-size: 14px; padding: 6px 0; font-family: monospace; pointer-events: none; }
    </style>
</head>
<body>

    <div class="global-music-bar">
        <button class="mc-button player-btn" onclick="window.toggleMusic()"><span id="music-icon">🔇</span></button>
        <button class="mc-button player-btn" onclick="window.nextTrack()"> > </button>
        <div class="marquee-container"><div id="track-name" class="marquee-text">等待播放...</div></div>
        <button class="mc-button player-btn" onclick="window.prevTrack()"> < </button>
    </div>
    <audio id="bg-audio" preload="auto"></audio>

    <div id="p1" class="screen">
        <canvas id="star-canvas"></canvas>
        <div style="display: flex; align-items: center; justify-content: center; position: relative; z-index: 10; margin-bottom: 25vh;">
            <button class="mc-button" style="width: 200px; height: 60px; font-size: 24px;" onclick="window.startEverything()">開始</button>
        </div>
    </div>

    <div id="p2" class="screen">
        <button class="mc-button" style="position:absolute; top:15px; left:15px; width:80px; height:35px; font-size:12px; z-index: 110;" onclick="window.nav('p1')">返回</button>
        <div class="gui-container">
            <div class="tabs-row">
                <button class="mc-button mc-tab" onclick="window.changeTab(this, 'start')">創作起點</button>
                <button class="mc-button mc-tab" onclick="window.changeTab(this, 'paint')">互動塗鴉</button>
                <button class="mc-button mc-tab" onclick="window.changeTab(this, 'works')">作品集</button>
                <button class="mc-button mc-tab" onclick="window.changeTab(this, 'process')">歷程記錄</button>
                <button class="mc-button mc-tab" onclick="window.changeTab(this, 'future')">未來發展</button>
            </div>
            <div class="gui-panel" id="main-panel"></div>
        </div>
    </div>

    <div id="detail-overlay" onclick="this.style.display='none'">
        <div id="detail-view" onclick="event.stopPropagation()">
            <div class="det-left"><img id="det-img" src=""></div>
            <div class="det-right">
                <div id="det-tag">分類</div>
                <h3 id="det-title">作品標題</h3>
                <div id="det-desc-container">
                    <strong style="color:#555; border-bottom:1px solid #999;">實作心得與過程</strong><br>
                    <div id="det-desc" style="margin-top:10px;"></div>
                </div>
            </div>
            <div class="close-tip">>> [ 點擊任何地方關閉頁面 ] <<</div>
        </div>
    </div>

    const audio = document.getElementById('bg-audio'), trackLabel = document.getElementById('track-name'), musicIcon = document.getElementById('music-icon');

    /* --- 🏆 14 件作品原始完整文字庫 --- */
    const worksData = {

    function initCanvas() {
        const c = document.getElementById('tab-canvas'), b = document.getElementById('wall-box');
        if(!c || !b) return;
        const ctx = c.getContext('2d');
        c.width = b.offsetWidth; c.height = b.offsetHeight;
        const spray = (x, y) => {
            const density = 150, radius = 25;
            ctx.fillStyle = currCol;
            for (let i = 0; i < density; i++) {
                const r = Math.random() * radius, angle = Math.random() * Math.PI * 2;
                const offsetX = r * Math.cos(angle), offsetY = r * Math.sin(angle);
                const opacity = Math.pow((radius - r) / radius, 4); 
                if (opacity > 0.02) { ctx.globalAlpha = opacity; ctx.beginPath(); ctx.arc(x + offsetX, y + offsetY, Math.random() * 1.5, 0, Math.PI * 2); ctx.fill(); }
            }
            ctx.globalAlpha = 1.0;
        };
        const handle = (e) => { const r = c.getBoundingClientRect(); spray((e.clientX || e.touches[0].clientX) - r.left, (e.clientY || e.touches[0].clientY) - r.top); };
        c.onmousedown = (e) => { painting = true; handle(e); };
        window.onmouseup = () => painting = false;
        c.onmousemove = (e) => { if(painting) requestAnimationFrame(() => handle(e)); };
        c.ontouchstart = (e) => { e.preventDefault(); painting = true; handle(e.touches[0]); };
        c.ontouchmove = (e) => { e.preventDefault(); handle(e.touches[0]); };
    }

    window.showDetail = (i) => {
        const data = worksData[i] || { title: `實作作品 ${i}`, tag: "未分類", desc: "暫無詳細說明。" };

        document.getElementById('det-tag').innerText = data.tag;

        document.getElementById('det-img').src = `i${i}.jpg`;
        document.getElementById('detail-overlay').style.display = 'flex';
        document.getElementById('det-desc-container').scrollTop = 0;
    };

    window.changeWall = (src) => { document.getElementById('wall-img').src = src; };
    window.clearCanvas = () => { const c = document.getElementById('tab-canvas'); if(c) c.getContext('2d').clearRect(0,0,c.width,c.height); };

    const starCanvas = document.getElementById('star-canvas'), starCtx = starCanvas.getContext('2d');
    function startStars() {
        starCanvas.width = window.innerWidth; starCanvas.height = window.innerHeight;
        const stars = Array.from({length:100}, () => ({ x:Math.random()*starCanvas.width, y:Math.random()*starCanvas.height, size:Math.random()*2, alpha:Math.random(), speed:Math.random()*0.05 }));
        function anim() {
            starCtx.clearRect(0,0,starCanvas.width,starCanvas.height);
            stars.forEach(s => { s.alpha += s.speed; if(s.alpha>1 || s.alpha<0) s.speed *= -1; starCtx.fillStyle=`rgba(255,255,255,${Math.abs(s.alpha)})`; starCtx.beginPath(); starCtx.arc(s.x, s.y, s.size, 0, Math.PI*2); starCtx.fill(); });
            requestAnimationFrame(anim);
        }
        anim();
    }
