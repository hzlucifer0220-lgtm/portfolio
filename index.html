<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學習成果實作檔案庫 v9.6 - Refined Edition</title>
    <style>
        :root {
            --mc-gray: #C6C6C6;
            --mc-dark: #555555;
            --mc-light: #FFFFFF;
            --mc-shadow: #373737;
        }

        /* 基礎重置 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: #FFF; 
            font-family: 'Segoe UI', '微軟正黑體', sans-serif;
            overflow: hidden; 
        }

        /* Minecraft 核心按鈕元件 */
        .mc-button {
            background: #707070; border: 3px solid #000; color: #E0E0E0; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset 3px 3px 0px var(--mc-light), inset -3px -3px 0px var(--mc-shadow);
            font-weight: bold; text-shadow: 2px 2px #3F3F3F; transition: transform 0.05s;
            user-select: none; position: relative; z-index: 10;
        }
        .mc-button:hover { background: #8B8B8B; color: #FFF; outline: 3px solid #FFF; outline-offset: -8px; }
        .mc-button:active { transform: scale(0.95); }

        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; }

        /* P1: 封面頁面 */
        #p1 { 
            background: url('cover_art.jpg') center/cover no-repeat; 
            display: flex; position: relative; 
            /* 🏆 核心修改：調整按鈕佈局 */
            flex-direction: column;
            justify-content: flex-end; /* 將按鈕推到底部方向 */
        }
        #star-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }

        /* P2: 主面板頁面 */
        #p2 { background: rgba(0,0,0,0.7) url('gui_bg.jpg') center/cover no-repeat; background-blend-mode: overlay; }
        .gui-container { width: 90vw; height: 60vw; max-height: 85vh; display: flex; flex-direction: column; margin-top: 50px; }
        
        .tabs-row { display: flex; gap: 4px; padding-left: 10px; }
        .mc-tab { width: 110px; height: 40px; font-size: 13px; border-bottom: none; border-radius: 5px 5px 0 0; margin-top: 8px; }
        .mc-tab.active { background: var(--mc-gray); color: #333; height: 48px; margin-top: 0; z-index: 2; text-shadow: none; box-shadow: inset 3px 3px 0 var(--mc-light); }

        .gui-panel { 
            flex: 1; background: var(--mc-gray); border: 4px solid #000; 
            box-shadow: inset 4px 4px 0 var(--mc-light), inset -4px -4px 0 var(--mc-dark);
            position: relative; overflow: hidden;
        }

        /* 作品集網格 */
        .work-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 20px; height: 100%; overflow-y: auto; }
        .work-frame { aspect-ratio: 3/4; background: #8B8B8B; border: 3px solid #000; padding: 10px; cursor: pointer; }
        .image-slot { width: 100%; aspect-ratio: 1/1; background: #000; border: 2px solid #333; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .image-slot img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .work-label { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 14px; text-shadow: 1px 1px #000; font-weight: bold; }

        /* 噴漆牆區域 */
        .paint-area { width: 100%; height: 100%; background: #1a1a1a; display: flex; align-items: center; justify-content: center; position: relative; }
        .wall-box { position: relative; width: 75%; height: 85%; border: 6px solid #000; background: #333; overflow: hidden; }
        #tab-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: crosshair; z-index: 5; }
        .paint-sidebar { 
            position: absolute; left: 15px; width: 85px; height: 85%;
            display: flex; flex-direction: column; gap: 8px; padding: 10px; 
            background: rgba(0,0,0,0.7); border: 2px solid #FFF; 
            overflow-y: auto; scrollbar-width: none;
        }
        .color-dot { width: 100%; aspect-ratio: 1/1; border: 2px solid #FFF; cursor: pointer; flex-shrink: 0; }
        .bg-btn { background: #444; color: white; font-size: 10px; display: flex; align-items: center; justify-content: center; text-align: center; }

        /* 詳細彈窗 */
        #detail-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; display: none; align-items: center; justify-content: center; }
        #detail-view { width: 320px; height: 600px; background: var(--mc-gray); border: 4px solid #000; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        #det-img { width: 100%; aspect-ratio: 1/1; background: #000; border: 3px solid #555; object-fit: contain; }
    </style>
</head>
<body>

    <div id="p1" class="screen">
        <canvas id="star-canvas"></canvas>
        <div style="display: flex; align-items: center; justify-content: center; position: relative; z-index: 10; margin-bottom: 25vh; /* 🏆 核心修改：精確控制底部距離 */">
            <button class="mc-button" style="width: 200px; height: 60px; font-size: 24px;" onclick="window.nav('p2')">開始</button>
        </div>
    </div>

    <div id="p2" class="screen">
        <button class="mc-button" style="position:absolute; top:15px; left:15px; width:80px; height:35px; font-size:12px; z-index: 20;" onclick="window.nav('p1')">返回</button>
        <div class="gui-container">
            <div class="tabs-row">
                <button class="mc-button mc-tab" onclick="window.changeTab(this, 'start')">創作起點</button>
                <button class="mc-button mc-tab" onclick="window.changeTab(this, 'paint')">互動塗鴉</button>
                <button class="mc-button mc-tab" onclick="window.changeTab(this, 'works')">作品集</button>
                <button class="mc-button mc-tab" onclick="window.changeTab(this, 'process')">歷程記錄</button>
                <button class="mc-button mc-tab" onclick="window.changeTab(this, 'future')">未來發展</button>
            </div>
            <div class="gui-panel" id="main-panel"></div>
        </div>
    </div>

    <div id="detail-overlay" onclick="this.style.display='none'">
        <div id="detail-view" onclick="event.stopPropagation()">
            <img id="det-img" src="">
            <h3 id="det-title" style="color: #000; margin: 0; border-bottom: 2px solid #8B8B8B;">標題</h3>
            <div id="det-desc" style="flex: 1; color: #333; overflow-y: auto; font-size: 14px; line-height: 1.5;"></div>
            <button class="mc-button" style="height: 45px; width: 100%;" onclick="document.getElementById('detail-overlay').style.display='none'">關閉</button>
        </div>
    </div>

<script>
    /* --- 1. 資料設定 --- */
    const worksData = Array.from({ length: 14 }, (_, i) => ({
        id: i + 1,
        title: `實作作品 ${i + 1}`,
        image: `i${i + 1}.jpg`,
        desc: `這是關於作品 ${i + 1} 的詳細實作心得。`
    }));

    let painting = false;
    let currCol = 'red';

    /* --- 2. 導覽系統 --- */
    window.nav = function(id) {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        const target = document.getElementById(id);
        if (target) {
            target.style.display = 'flex';
            if (id === 'p2') {
                const tabs = document.querySelectorAll('.mc-tab');
                window.changeTab(tabs[0], 'start'); 
                stopStars();
            } else if (id === 'p1') {
                startStars();
            }
        }
    };

    /* --- 3. 標籤內容切換 --- */
    window.changeTab = function(btn, type) {
        document.querySelectorAll('.mc-tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        const panel = document.getElementById('main-panel');
        if (!panel) return;
        panel.innerHTML = ''; 

        if (type === 'works') {
            panel.innerHTML = '<div class="work-grid" id="grid-content"></div>';
            renderWorks();
        } else if (type === 'paint') {
            panel.innerHTML = `
                <div class="paint-area">
                    <div class="paint-sidebar">
                        <div style="color:white; font-size:11px; text-align:center;">噴漆</div>
                        <div class="color-dot" style="background:red" onclick="currCol='red'"></div>
                        <div class="color-dot" style="background:lime" onclick="currCol='lime'"></div>
                        <div class="color-dot" style="background:blue" onclick="currCol='blue'"></div>
                        <div class="color-dot" style="background:yellow" onclick="currCol='yellow'"></div>
                        <div class="color-dot" style="background:white" onclick="currCol='white'"></div>
                        <div class="color-dot" style="background:black" onclick="currCol='black'"></div>
                        <hr style="width:100%; border:1px dashed #555;">
                        <div style="color:white; font-size:11px; text-align:center;">場景</div>
                        <div class="color-dot bg-btn" onclick="window.changeWall('wall.jpg')">磚牆</div>
                        <div class="color-dot bg-btn" onclick="window.changeWall('shutter.jpg')">鐵門</div>
                        <div class="color-dot bg-btn" onclick="window.changeWall('truck.jpg')">卡車</div>
                        <div class="color-dot bg-btn" onclick="window.changeWall('sticker.jpg')">貼紙</div>
                        </div>
                    <div class="wall-box" id="wall-box">
                        <img id="wall-img" src="wall.jpg" style="width:100%; height:100%; object-fit:cover; position:absolute; top:0; left:0;" onerror="this.style.background='#222'">
                        <canvas id="tab-canvas"></canvas>
                    </div>
                    <button class="mc-button" style="position:absolute; bottom:20px; right:20px; width:100px; height:35px; font-size:12px; z-index:10;" onclick="window.clearCanvas()">清除全牆</button>
                </div>`;
            setTimeout(initCanvas, 50);
        } else if (type === 'start') {
            panel.innerHTML = `
                <div style="width:100%; height:100%; overflow-y:auto; padding:30px; scrollbar-width:thin; scrollbar-color:#707070 #C6C6C6;">
                    <h2 style="color:#000; border-bottom:4px solid #555; padding-bottom:10px; margin-top:0; font-family:'微軟正黑體', sans-serif;">🌱 創作起點</h2>
                    <div style="float: right; width: 35%; margin-left: 20px; margin-bottom: 15px; border: 4px solid #000; background:#000; box-shadow: 6px 6px 0px rgba(0,0,0,0.15);">
                        <img src="art.jpg" style="width:100%; height:auto; display:block;" onerror="this.src='https://via.placeholder.com/300x400?text=art.jpg+Missing'">
                    </div>
                    <div style="color:#1a1a1a; font-size:16px; line-height:1.8; font-family:'微軟正黑體', sans-serif; text-align:justify;">
                        <p style="font-size:20px; font-weight:bold; color:#333; margin-top:0;">🧩 跨越街頭與數位的創作實驗</p>
                        <p>在過去的創作經驗中，我長期接觸街頭塗鴉與音樂製作，這些創作形式具有強烈的個人風格與即時性，但也存在著難以保存與延伸的限制。因此，我開始思考：是否能透過數位媒介與AI技術，讓這些創作突破原有的限制，轉化為更具互動性與延展性的形式。</p>
                        <p>在本次實作中，我嘗試以「網站」作為創作載體，結合街頭塗鴉的視覺語言與數位互動設計，並引入AI作為創作過程中的輔助工具，探索藝術與科技之間的融合可能。</p>
                        <p>在製作過程中，我發現與AI的互動並非單向操作，而是一種需要反覆溝通與調整的協作關係。從網站架構的建立，到介面細節的設計，我必須學習如何將抽象的想法轉化為AI可以理解的指令，並透過不斷修正與測試，逐步接近理想成果。過程中，任何細微的錯誤都可能影響整體系統運作，這也讓我重新理解「設計」不僅是視覺呈現，更包含邏輯與結構的建構。</p>
                        <p>AI在此不僅是工具，更像是一位引導者，使我能夠在陌生領域中快速建立基礎，並透過持續嘗試與修正，將原本停留在想像中的創意具體實現。這樣的經驗也讓我意識到，未來的創作不再只是單一媒材的呈現，而是跨領域整合與人機協作的過程。</p>
                        <p>本次的創作不僅是一份作品的呈現，更是一個探索創作方式轉變的過程。</p>
                    </div>
                    <div style="clear:both;"></div>
                </div>`;
        } else {
            const titles = { process: '🛠️ 歷程記錄', future: '🚀 未來發展' };
            panel.innerHTML = `<div style="padding:30px; color:#000;"><h2>${titles[type]}</h2><p>[ 系統檔案讀取成功 ]</p><p>內容編輯中，請稍候。</p></div>`;
        }
    };

    /* --- 4. 作品集與噴漆核心邏輯 --- */
    function renderWorks() {
        const g = document.getElementById('grid-content');
        if (!g) return;
        g.innerHTML = worksData.map(w => `
            <div class="work-frame" onclick="window.showDetail(${w.id})">
                <div class="image-slot"><img src="${w.image}" onerror="this.src='https://via.placeholder.com/150?text=IMG'"></div>
                <div class="work-label">${w.title}</div>
            </div>`).join('');
    }

    window.showDetail = function(id) {
        const w = worksData.find(x => x.id === id);
        if (!w) return;
        document.getElementById('det-title').innerText = w.title;
        document.getElementById('det-desc').innerText = w.desc;
        const img = document.getElementById('det-img');
        img.src = w.image;
        img.onerror = () => img.src = 'https://via.placeholder.com/300?text=NONE';
        document.getElementById('detail-overlay').style.display = 'flex';
    };

    window.changeWall = (src) => { document.getElementById('wall-img').src = src; };
    window.clearCanvas = () => { const c = document.getElementById('tab-canvas'); if(c) c.getContext('2d').clearRect(0,0,c.width,c.height); };

    function initCanvas() {
                /* 🏆 優化版噴漆邏輯：加大筆刷、保持濃度、邊緣細膩 --- */
        const spray = (x, y) => {
            // density 提升到 150，確保大筆刷依然紮實
            const density = 150; 
            // radius 增加到 25，展現大面積塗鴉感
            const radius = 25;  
            
            ctx.fillStyle = currCol;
            for (let i = 0; i < density; i++) {
                const r = Math.random() * radius;
                const angle = Math.random() * Math.PI * 2;
                const offsetX = r * Math.cos(angle);
                const offsetY = r * Math.sin(angle);
                
                // 霧化公式維持 Math.pow(..., 4) 讓邊緣收斂，不至於太散
                const opacity = Math.pow((radius - r) / radius, 4); 
                
                if (opacity > 0.02) { 
                    ctx.globalAlpha = opacity;
                    ctx.beginPath();
                    // 顆粒大小微調，讓大筆刷看起來更有噴霧細節
                    ctx.arc(x + offsetX, y + offsetY, Math.random() * 1.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            ctx.globalAlpha = 1.0;
        };

        const handleMove = (e) => {
            if(!painting) return;
            const rect = c.getBoundingClientRect();
            const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
            const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
            spray(x, y);
        };

        c.onmousedown = (e) => { painting = true; handleMove(e); };
        window.onmouseup = () => painting = false;
        c.onmousemove = (e) => { if(painting) requestAnimationFrame(() => handleMove(e)); };
        c.ontouchstart = (e) => { e.preventDefault(); painting = true; handleMove(e.touches[0]); };
        c.ontouchmove = (e) => { e.preventDefault(); handleMove(e.touches[0]); };
        c.ontouchend = () => painting = false;
    }

    /* --- 6. 星星系統 --- */
    const starCanvas = document.getElementById('star-canvas');
    const starCtx = starCanvas.getContext('2d');
    let stars = [], starAnimationId;
    class Star {
        constructor() {
            this.x = Math.random() * starCanvas.width;
            this.y = Math.random() * starCanvas.height;
            this.size = Math.random() * 2 + 0.5;
            this.blinkSpeed = Math.random() * 0.05 + 0.01;
            this.alpha = Math.random();
            this.goingUp = Math.random() > 0.5;
        }
        draw() {
            starCtx.beginPath();
            starCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            starCtx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
            starCtx.fill();
        }
        update() {
            if (this.goingUp) { this.alpha += this.blinkSpeed; if (this.alpha > 1) this.goingUp = false; }
            else { this.alpha -= this.blinkSpeed; if (this.alpha < 0) this.goingUp = true; }
        }
    }
    function initStars() {
        starCanvas.width = window.innerWidth; starCanvas.height = window.innerHeight;
        stars = [];
        for (let i = 0; i < 100; i++) stars.push(new Star());
    }
    function animateStars() {
        starCtx.clearRect(0, 0, starCanvas.width, starCanvas.height);
        stars.forEach(s => { s.update(); s.draw(); });
        starAnimationId = requestAnimationFrame(animateStars);
    }
    function startStars() { if (!starAnimationId) { initStars(); animateStars(); } }
    function stopStars() { if (starAnimationId) { cancelAnimationFrame(starAnimationId); starAnimationId = null; } }

    document.addEventListener('DOMContentLoaded', () => { window.nav('p1'); startStars(); });
</script>
</body>
</html>
