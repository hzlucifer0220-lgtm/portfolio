<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學習成果實作檔案庫 v18.0 - Final Archive</title>
    <style>
        :root {
            --mc-gray: #C6C6C6; --mc-dark: #555555; --mc-light: #FFFFFF; --mc-shadow: #373737; --mc-accent: #E67E22;
        }

        /* 基礎重置 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: #FFF; 
            font-family: 'Segoe UI', '微軟正黑體', sans-serif;
            overflow: hidden; 
        }

        /* [🔒 鎖定區域] Minecraft 核心按鈕與音樂播放器樣式 */
        .mc-button {
            background: #707070; border: 3px solid #000; color: #E0E0E0; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset 3px 3px 0px var(--mc-light), inset -3px -3px 0px var(--mc-shadow);
            font-weight: bold; text-shadow: 2px 2px #3F3F3F; transition: transform 0.05s;
            user-select: none; position: relative; z-index: 10;
        }
        .mc-button:hover { background: #8B8B8B; color: #FFF; outline: 3px solid #FFF; outline-offset: -8px; }
        .mc-button:active { transform: scale(0.95); }

        .global-music-bar {
            position: fixed; top: 15px; right: 15px; width: 15vw; min-width: 250px; height: 40px;
            display: flex; flex-direction: row-reverse; align-items: center; gap: 5px; z-index: 2000;
        }
        .player-btn { width: 35px; height: 35px; font-size: 14px; flex-shrink: 0; }
        .marquee-container { flex: 1; height: 30px; background: rgba(0, 0, 0, 0.8); border: 2px solid #555; overflow: hidden; position: relative; display: flex; align-items: center; }
        .marquee-text { position: absolute; white-space: nowrap; color: #FFFFFF; font-family: monospace; font-size: 12px; padding-left: 100%; animation: marquee 10s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-250%); } }

        /* [🔒 鎖定區域] P1 封面與 GUI 框架 */
        #p1 { background: url('cover_art.jpg') center/cover no-repeat; display: flex; position: relative; flex-direction: column; justify-content: flex-end; }
        #p2 { background: rgba(0,0,0,0.7) url('gui_bg.jpg') center/cover no-repeat; background-blend-mode: overlay; }
        .gui-container { width: 90vw; height: 60vw; max-height: 85vh; display: flex; flex-direction: column; margin-top: 65px; }
        .tabs-row { display: flex; gap: 4px; padding-left: 10px; }
        .mc-tab { width: 110px; height: 40px; font-size: 13px; border-bottom: none; border-radius: 5px 5px 0 0; margin-top: 8px; }
        .mc-tab.active { background: var(--mc-gray); color: #333; height: 48px; margin-top: 0; z-index: 2; text-shadow: none; box-shadow: inset 3px 3px 0 var(--mc-light); }
        .gui-panel { flex: 1; background: var(--mc-gray); border: 4px solid #000; box-shadow: inset 4px 4px 0 var(--mc-light), inset -4px -4px 0 var(--mc-dark); position: relative; overflow: hidden; }

        /* [✨ 更新區域] 作品集網格美工排版 */
        .work-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; padding: 30px; height: 100%; overflow-y: auto; }
        .work-frame { position: relative; aspect-ratio: 1/1; background: #222; border: 4px solid #000; overflow: hidden; cursor: pointer; box-shadow: 6px 6px 0px rgba(0,0,0,0.2); }
        .work-frame:hover .work-label { height: 35%; background: rgba(230, 126, 34, 0.95); }
        .image-slot { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .image-slot img { width: 100%; height: 100%; object-fit: cover; }
        .work-label { 
            position: absolute; bottom: 0; left: 0; width: 100%; height: 26%; 
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(4px); border-top: 2px solid var(--mc-light);
            display: flex; flex-direction: column; justify-content: center; padding: 0 12px; transition: all 0.3s ease;
        }
        .work-title-text { font-size: 14px; color: #FFF; font-weight: bold; margin: 0; text-shadow: 2px 2px 0px #000; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .work-tag-text { font-size: 10px; color: #BBB; text-transform: uppercase; margin-bottom: 2px; }

        /* [✨ 更新區域] 彈窗樣式與圖片修復 */
        #detail-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); z-index: 3000; display: none; align-items: center; justify-content: center; cursor: pointer; }
        #detail-view { width: 85vw; max-width: 1300px; aspect-ratio: 2/1; background: #E0E0E0; border: 6px solid #000; display: flex; position: relative; cursor: default; }
        .det-left { flex: 1; background: #000; border-right: 4px solid #000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .det-left img { max-width: 100%; max-height: 100%; object-fit: contain; box-shadow: 0 0 20px rgba(255,255,255,0.1); }
        .det-right { flex: 1; display: flex; flex-direction: column; color: #1a1a1a; overflow: hidden; }
        .det-header { background: #333; color: #FFF; padding: 25px 30px; }
        #det-desc-container { flex: 1; overflow-y: auto; padding: 30px; background: #F5F5F5; display: flex; flex-direction: column; }
        #det-desc { font-size: 16px; line-height: 1.85; text-align: justify; white-space: pre-wrap; color: #333; flex: 1; }

        /* [🔒 鎖定區域] 互動塗鴉樣式 */
        .paint-sidebar { position: absolute; left: 15px; top: 20px; width: 85px; bottom: 20px; display: flex; flex-direction: column; gap: 8px; padding: 12px; background: rgba(0,0,0,0.85); border: 2px solid #FFF; z-index: 100; }
        .color-dot { width: 100%; aspect-ratio: 1/1; border: 2px solid #FFF; cursor: pointer; }
        .wall-box { flex: 1; margin: 20px 20px 20px 115px; border: 4px solid #000; background: #222; position: relative; overflow: hidden; }
        #tab-canvas { position: absolute; top: 0; left: 0; cursor: crosshair; }
    </style>
</head>
<body>

    <div class="global-music-bar">
        <button class="mc-button player-btn" onclick="window.toggleMusic()"><span id="music-icon">🔇</span></button>
        <button class="mc-button player-btn" onclick="window.nextTrack()"> > </button>
        <div class="marquee-container"><div id="track-name" class="marquee-text">等待播放...</div></div>
        <button class="mc-button player-btn" onclick="window.prevTrack()"> < </button>
    </div>
    <audio id="bg-audio" preload="auto"></audio>

    <div id="p1" class="screen">
        <canvas id="star-canvas" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none;"></canvas>
        <div style="display: flex; align-items: center; justify-content: center; position: relative; z-index: 10; margin-bottom: 25vh;">
            <button class="mc-button" style="width: 200px; height: 60px; font-size: 24px;" onclick="window.startEverything()">開始</button>
        </div>
    </div>

    <div id="p2" class="screen">
        <button class="mc-button" style="position:absolute; top:15px; left:15px; width:80px; height:35px; font-size:12px; z-index: 110;" onclick="window.nav('p1')">返回</button>
        <div class="gui-container">
            <div class="tabs-row">
                <button class="mc-button mc-tab active" onclick="window.changeTab(this, 'start')">創作起點</button>
                <button class="mc-button mc-tab" onclick="window.changeTab(this, 'paint')">互動塗鴉</button>
                <button class="mc-button mc-tab" onclick="window.changeTab(this, 'works')">作品集</button>
                <button class="mc-button mc-tab" onclick="window.changeTab(this, 'process')">歷程記錄</button>
                <button class="mc-button mc-tab" onclick="window.changeTab(this, 'future')">未來發展</button>
            </div>
            <div class="gui-panel" id="main-panel"></div>
        </div>
    </div>

    <div id="detail-overlay" onclick="this.style.display='none'">
        <div id="detail-view" onclick="event.stopPropagation()">
            <div class="det-left"><img id="det-img" src=""></div>
            <div class="det-right">
                <div class="det-header">
                    <div id="det-tag" style="background:var(--mc-accent); padding:2px 8px; font-size:11px; font-weight:bold; display:inline-block; margin-bottom:8px;">分類</div>
                    <h3 id="det-title" style="margin:0; font-size:24px;">標題</h3>
                </div>
                <div id="det-desc-container">
                    <div id="det-desc"></div>
                </div>
            </div>
        </div>
    </div>

<script>
    // [🔒 鎖定] 全域變數與資料 (部分內容已鎖定)
    let currCol = 'red', painting = false, currentTrackIndex = 0, isPlaying = false;
    const audio = document.getElementById('bg-audio'), trackLabel = document.getElementById('track-name'), musicIcon = document.getElementById('music-icon');
    const playlist = [{ name: "Now Playing: late night", src: "late night.mp3" }, { name: "Now Playing: made it through", src: "made it through.mp3" }, { name: "Now Playing: M.I.A", src: "M.I.A.mp3" }];

    const worksData = {
        1: { title: "個人風格帽踢", tag: "服飾設計", desc: `本作品以「個人風格建構」為核心，嘗試創作一件有別於市面既有樣式的服飾設計，藉此探索自我認同與視覺語言之間的關係。整體設計不僅著重於外觀呈現，更強調服飾作為個人風格載體的可能性。\n在正面設計上，我以手繪草稿為起點，結合 AI 圖像生成技術進行多次修正與轉化，最終發展出一組帶有哥德式結構與荊棘意象的字體標誌。此標誌在視覺上呈現出銳利與有機交錯的特性，象徵個人風格中衝突與成長並存的狀態。\n背面設計則參考源自音樂文化中的「髒標」（Parental Advisory）視覺符號。此標誌從原先的警示功能，逐漸轉化為流行文化中的象徵語言。我將其重新詮釋，並結合以個人姓名字首延伸設計的標記圖像，以噴漆效果覆寫其上，形成具有街頭語彙的視覺層次，同時也回應標記（tagging）與個人存在感的表達。\n本作品不僅是一件服飾設計，更是一項跨媒材的創作實驗，透過手繪、AI 技術與街頭文化元素的整合，嘗試將設計轉化為可融入日常生活的表達形式，進一步實踐「在生活中展現自我風格」的創作理念。` },
        2: { title: "班服設計藝術", tag: "班級服飾", desc: `本作品以班級服飾為創作載體，核心概念圍繞「和」字展開，並以「和諧（harmonious）」作為主要設計主題。透過字義延伸，將「和」轉化為視覺語言，不僅象徵人際之間的平衡與共存，也承載我對班級團結與凝聚力的期待。在整體設計上，我選擇以泰迪熊作為主要視覺媒介，作為溫暖與陪伴的象徵，試圖讓作品跳脫一般班服的制式印象，使其不只是服裝，更是一種具有情感溫度的設計表達。正反兩面皆融入泰迪熊元素，並透過不同構圖方式呈現，建立整體視覺的一致性與變化性。\n「和」（harmonious）一詞在畫面中以三種不同形式出現，透過排列與轉換，使其在視覺上彼此獨立卻不衝突，象徵多元個體之間仍能達成和諧共存的狀態，進一步呼應班級群體的精神。\n在製作過程中，正面設計先以手繪草稿構思整體構圖，再透過數位繪圖軟體進行線條描繪與細節修飾，使畫面更加精緻且具有設計感。背面則以泰迪熊結合夕陽場景作為主視覺，並透過畫面分割與交錯排列的方式，將畫面切分為三個區塊，營造出層次感與動態視覺效果，使單一圖像產生多重觀看可能。\n此外，在主視覺周圍加入多項輔助設計元素以強化整體完整度：上方以「harmonious」作為標題，明確點出主題；左側加入學校座標，建立場域連結；下方使用拉丁文「bona fide」象徵善意與真誠；右側則呈現班級資訊，使畫面在視覺與資訊層面皆達到平衡。本作品透過文字、圖像與排版的整合，將「和」的概念轉化為具體的視覺設計，並藉由服飾作為媒介，傳遞情感、文化與群體認同，使設計真正融入生活之中。` },
        3: { title: "AI 藝術創意封面設計", tag: "音樂專輯封面", desc: `本作品為一張結合 AI 圖像生成技術之音樂專輯封面設計，創作核心圍繞「個體在情感與成長之間的拉扯狀態」，並嘗試將歌曲文本中的情緒張力轉譯為具體的視覺敘事結構。在創作過程中，我並非單次生成圖像，而是透過多次調整描述語句（prompt）與視覺參數，逐步控制畫面構圖、風格與情緒強度，使 AI 成為可被引導的創作工具，而非隨機生成的結果。此過程亦反映我對人機協作創作模式的探索。\n畫面以一扇發光的「門」作為視覺核心，其形式並非具體物件，而更接近一種空間裂縫（portal），象徵人生轉折與選擇的臨界點。主體人物以無臉背影呈現，去除個體特徵，使觀者得以投射自身經驗，強化作品的普遍性與情感共鳴。人物動作設定為「跨出門外的瞬間」，然而其腳部卻被後方延伸出的影子牽制，形成前進與停滯之間的張力，具象化內心尚未脫離過去的心理狀態。\n在視覺敘事上，本作品刻意設計觀看順序：觀者首先被高亮度的門吸引，其次注意到人物的行進動作，最後才察覺影子對其的拉扯，形成「延遲揭示（late reveal）」的觀看體驗。此種觀看機制使情緒並非一次性呈現，而是在時間中逐步展開，提升整體敘事深度。\n環境構成採用強烈對比策略：畫面左側以低明度、厚重筆觸與不穩定紋理呈現壓抑與混沌，象徵過去的情感負擔；右側則以紫藍色系銀河與流星構成開放空間，代表未來、希望與不確定性。流星元素進一步對應歌曲中「向宇宙許願」的意象，使視覺與聲音敘事形成跨媒材連結。整體透過明暗與色彩的對立，建立出一種雙重性（duality）的結構關係。\n在風格處理上，本作品融合油畫筆觸、電影式光影（cinematic lighting）與當代音樂封面視覺語彙，並透過顆粒質感（grain）與邊緣模糊（blur）降低數位生成的機械感，使畫面更接近真實藝術創作的質地。同時，角色造型參考當代音樂文化中的街頭風格，使整體視覺語言與音樂類型保持一致。\n本作品不僅是一張封面設計，更是一項關於「AI 視覺生成 × 情感敘事 × 音樂文化」的跨領域實驗。透過人為控制與機器生成之間的反覆調整，嘗試建立一種新的創作模式，並探索數位工具如何參與並擴展當代藝術表現的可能性。\n\n<div style='text-align:center; margin:20px 0; background:#FFF; padding:15px; border:4px solid #000;'><img src='qr_code.jpg' style='width:120px;' onerror='this.src=\"https://via.placeholder.com/120?text=QR+CODE\"'><div style='font-size:12px; color:#333; margin-top:5px; font-weight:bold;'>掃描 QR Code 聆聽專輯曲目</div></div>` },
        4: { title: "字體藝術探索", tag: "哥德式字體", desc: `本作品為一組以「Island」為主題的哥德式字體手繪草稿，創作重點在於探索字體結構與裝飾性線條之間的關係。透過參考哥德字體的垂直延伸與尖銳筆觸特徵，將文字轉化為具有節奏感與視覺張力的圖像形式。\n在設計過程中，我以手繪方式反覆調整字母比例、筆畫粗細與裝飾細節，使整體字體在保持可讀性的同時，仍具備藝術表現性。線條之間的銜接與延伸，形成類似結構體的視覺效果，使文字不僅作為語言符號存在，同時也成為畫面中的造型元素。\n此作品作為草稿階段的設計實驗，著重於字體造型的發展與可能性探索，並為後續更完整的視覺設計奠定基礎，展現個人對字體藝術與風格轉譯的初步理解。` },
        5: { title: "線條與色彩實驗 I", tag: "街頭塗鴉 Tag", desc: `本作品為兩個街頭塗鴉 Tag（Selfish 與 Caught）的手繪設計，旨在探索街頭文字的節奏感與個人風格轉譯。作品延續 Tag 風格的自由筆觸與動態線條，強調字母間的流動性與連結性，使每個字母既獨立又形成整體視覺節奏。\n在創作過程中，我使用手繪方式控制線條粗細與傾斜角度，刻意保留筆觸的粗糙感與不規則性，以呈現街頭文化中即興與叛逆的精神。字體設計不僅作為文字存在，同時作為視覺符號，傳達出個人風格與態度。\n此作品展示我對街頭塗鴉元素的理解與實踐能力，也反映了我在手繪與構圖上對節奏、平衡與個性化設計的掌握。` },
        6: { title: "線條與色彩實驗 II", tag: "風格融合", desc: `本作品將 Bubble 風格與 Tag 風格結合，上方呈現「Smile」以圓潤、流動的 Bubble 字體，下方的「Pass Away」則使用街頭塗鴉 Tag 風格呈現，強調動態筆觸與線條的即興感。這種上下風格對比，形成柔和圓潤與尖銳個性的視覺衝突，呼應情感的多面性。` },
        7: { title: "線條與色彩實驗 III", tag: "立體造型", desc: `本作品以立體造型手法呈現街頭塗鴉文字「Loyalty」與「Shame」，探索字體結構在三維視覺中的表現可能性。透過立體化筆觸，文字不再僅作為符號，而成為具有深度與空間感的視覺元素。` },
        8: { title: "永恆交響", tag: "雙語設計", desc: `本作品以粉紅色為主色調，將中文「永遠」與英文「Forever」進行字體藝術設計，探索中英文在街頭塗鴉語言中的視覺互動。中文「永遠」以線條造型呈現，英文「Forever」則採用 Bubble 風格。` },
        9: { title: "手握夢想", tag: "插畫動態", desc: `本作品以手部動態為視覺主體，呈現一隻戴手套的手握住 Bubble 風格的文字「Dream」，底部搭配姓名貼紙並使用類似簽名的 Tag 風格作簽名。` },
        10: { title: "線條與色彩實驗 IV", tag: "混搭風格", desc: `本作品將兩種風格結合於一個畫面：上半部分以 Bubble 風格呈現「Squid Game」，下半部分則進行街頭塗鴉練習，以「Street」字體呈現。` },
        11: { title: "線條與色彩實驗 V", tag: "Bubble 練習", desc: `本作品以 Bubble 字體為主題進行練習，專注於文字的圓潤造型與線條流動感。透過筆劃的厚薄變化和弧線延伸，使字體在視覺上產生彈性與立體感。` },
        12: { title: "夕陽下的故事", tag: "城市背景", desc: `本作品以街頭插畫的方式呈現「Los Angle」字體設計，結合當地文化特色的 Low Rider 車輛作為視覺焦點。` },
        13: { title: "財富交錯", tag: "概念設計", desc: `本作品以「Cash」字體為核心進行視覺設計，將文字從中間分裂，讓「Money」出現在裂縫之中，形成文字之間的對話與張力。` },
        14: { title: "線條與節奏", tag: "視覺韻律", desc: `本作品以交錯線條作為創作核心，將簡單的線條元素拆解、重組，探索視覺節奏、空間感與畫面層次。` }
    };

    // [🔒 鎖定] 核心導航與星星引擎
    window.nav = function(id) { document.querySelectorAll('.screen').forEach(s => s.style.display = 'none'); document.getElementById(id).style.display = 'flex'; if(id === 'p2') window.changeTab(document.querySelector('.mc-tab'), 'start'); else startStars(); };
    window.startEverything = function() { window.nav('p2'); if (!isPlaying) { audio.play().then(() => { musicIcon.innerText = '🎵'; isPlaying = true; }); } };
    window.toggleMusic = function() { if (isPlaying) { audio.pause(); musicIcon.innerText = '🔇'; isPlaying = false; } else { audio.play().then(() => { musicIcon.innerText = '🎵'; isPlaying = true; }).catch(e => {}); } };
    window.nextTrack = function() { currentTrackIndex = (currentTrackIndex + 1) % playlist.length; audio.src = playlist[currentTrackIndex].src; trackLabel.innerText = playlist[currentTrackIndex].name; if (isPlaying) audio.play(); };
    window.prevTrack = function() { currentTrackIndex = (currentTrackIndex - 1 + playlist.length) % playlist.length; audio.src = playlist[currentTrackIndex].src; trackLabel.innerText = playlist[currentTrackIndex].name; if (isPlaying) audio.play(); };

    // [✨ 更新] 分頁切換與內容生成
    window.changeTab = function(btn, type) {
        document.querySelectorAll('.mc-tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        const panel = document.getElementById('main-panel');
        panel.innerHTML = ''; 

        if (type === 'start') {
            panel.innerHTML = `
            <div style="width:100%; height:100%; overflow-y:auto; padding:40px; color:#1a1a1a; background:#F0F0F0; position:relative;">
                <div style="border-bottom:5px solid #333; padding-bottom:15px; margin-bottom:25px;">
                    <h2 style="margin:0; font-size:32px; font-weight:800; letter-spacing:2px;">🧩 創作起點</h2>
                    <span style="font-size:14px; color:#666; font-weight:bold;">跨越街頭與數位的創作實驗</span>
                </div>
                <div style="float: right; width: 42%; margin-left: 30px; border: 6px solid #000; background:#000;">
                    <img src="art.jpg" style="width:100%; display:block;" onerror="this.src='https://via.placeholder.com/400'">
                </div>
                <div style="font-size:17px; line-height:2; text-align:justify; color:#222;">
                    <p>在過去的創作經驗中，我長期接觸<b>街頭塗鴉與音樂製作</b>，這些創作形式具有強烈的個人風格與即時性，但也存在著難以保存與延伸的限制。因此，我開始思考：是否能透過數位媒介與 AI 技術，讓這些創作突破原有的限制，並在不同的載體上呈現出新的生命力。</p>
                    <p>在本次實作中，我嘗試以<b>「網站」作為創作載體</b>，將街頭塗鴉的視覺語言與數位互動設計結合。這不僅僅是將作品數位化，更是嘗試建立一個動態的、可互動的檔案庫，讓觀者能透過噴漆、點擊與聆聽，參與到我的創作過程之中。</p>
                    <p>在技術實作上，我引入了 AI 作為創作過程中的輔助工具。AI 在此不僅僅是一個產生圖像的工具，更像是一位<b>引導者與協作者</b>，協助我處理複雜的程式邏輯與介面優化。</p>
                </div>
                <div style="clear:both; margin-top:40px; padding:20px; background:#333; color:#FFF; border-left:10px solid var(--mc-accent); font-style:italic;">
                    <p style="margin:0; font-size:18px; line-height:1.6;">" 本次創作不僅是作品的呈現，更是一個探索創作方式轉變的過程，嘗試將設計轉化為可融入日常生活的表達形式，實踐「在生活中展現自我風格」的初衷。 "</p>
                </div>
            </div>`;
        } else if (type === 'paint') {
            panel.innerHTML = `
            <div style="width:100%; height:100%; display:flex; position:relative;">
                <div class="paint-sidebar">
                    <div class="color-dot" style="background:red" onclick="currCol='red'"></div>
                    <div class="color-dot" style="background:lime" onclick="currCol='lime'"></div>
                    <div class="color-dot" style="background:blue" onclick="currCol='blue'"></div>
                    <div class="color-dot" style="background:yellow" onclick="currCol='yellow'"></div>
                    <div class="color-dot" style="background:white" onclick="currCol='white'"></div>
                    <div class="color-dot" style="background:black" onclick="currCol='black'"></div>
                    <hr style="width:100%; border:1px dashed #555;">
                    <button class="mc-button" style="font-size:10px; padding:5px 0; margin-bottom:5px;" onclick="window.changeWall('wall.jpg')">磚牆</button>
                    <button class="mc-button" style="font-size:10px; padding:5px 0; margin-bottom:5px;" onclick="window.changeWall('shutter.jpg')">鐵門</button>
                    <button class="mc-button" style="font-size:10px; padding:5px 0; margin-bottom:5px;" onclick="window.changeWall('truck.jpg')">卡車</button>
                    <button class="mc-button" style="font-size:10px; padding:5px 0;" onclick="window.changeWall('sticker.jpg')">貼紙</button>
                </div>
                <div class="wall-box" id="wall-box">
                    <img id="wall-img" src="wall.jpg" style="width:100%; height:100%; object-fit:cover; position:absolute;">
                    <canvas id="tab-canvas"></canvas>
                </div>
                <button class="mc-button" style="position:absolute; bottom:30px; right:35px; width:100px; height:40px;" onclick="window.clearCanvas()">清除全牆</button>
            </div>`;
            setTimeout(initCanvas, 150);
        } else if (type === 'works') {
            panel.innerHTML = '<div class="work-grid" id="grid-content"></div>';
            for(let i=1; i<=14; i++) {
                const data = worksData[i];
                document.getElementById('grid-content').innerHTML += `
                <div class="work-frame" onclick="window.showDetail(${i})">
                    <div class="image-slot"><img src="i${i}.jpg" onerror="this.src='https://via.placeholder.com/300?text=Work+${i}'"></div>
                    <div class="work-label">
                        <div class="work-tag-text">${data.tag}</div>
                        <div class="work-title-text">${data.title}</div>
                    </div>
                </div>`;
            }
        } else {
            panel.innerHTML = `<div style="padding:40px; color:#1a1a1a;"><h2>功能開發中</h2><p>此區域尚未填寫內容。</p></div>`;
        }
    };

    // [🔒 鎖定] 噴漆畫布與功能
    function initCanvas() {
        const c = document.getElementById('tab-canvas'), b = document.getElementById('wall-box');
        if(!c || !b) return;
        const ctx = c.getContext('2d');
        c.width = b.offsetWidth; c.height = b.offsetHeight;
        const spray = (x, y) => {
            const density = 150, radius = 25; ctx.fillStyle = currCol;
            for (let i = 0; i < density; i++) {
                const r = Math.random() * radius, angle = Math.random() * Math.PI * 2, offsetX = r * Math.cos(angle), offsetY = r * Math.sin(angle), opacity = Math.pow((radius - r) / radius, 4); 
                if (opacity > 0.02) { ctx.globalAlpha = opacity; ctx.beginPath(); ctx.arc(x + offsetX, y + offsetY, Math.random() * 1.5, 0, Math.PI * 2); ctx.fill(); }
            }
            ctx.globalAlpha = 1.0;
        };
        const handle = (e) => { const r = c.getBoundingClientRect(); const x = (e.clientX || (e.touches ? e.touches[0].clientX : 0)) - r.left; const y = (e.clientY || (e.touches ? e.touches[0].clientY : 0)) - r.top; spray(x, y); };
        c.onmousedown = (e) => { painting = true; handle(e); };
        window.onmouseup = () => painting = false;
        c.onmousemove = (e) => { if(painting) handle(e); };
        c.ontouchstart = (e) => { e.preventDefault(); painting = true; handle(e); };
        c.ontouchmove = (e) => { e.preventDefault(); handle(e); };
    }

    // [✨ 更新] 作品詳情彈窗
    window.showDetail = (i) => {
        const data = worksData[i];
        document.getElementById('det-title').innerText = data.title;
        document.getElementById('det-tag').innerText = data.tag;
        document.getElementById('det-desc').innerHTML = `
            <div style="flex: 1;">${data.desc}</div>
            <div style="margin-top: 40px; padding-top: 20px; border-top: 1px solid #DDD; color: #999; font-size: 12px; text-align: center; letter-spacing: 1px; font-weight: bold;">
                [ 點擊任何空白區域關閉視窗 ]
            </div>
        `;
        document.getElementById('det-img').src = `i${i}.jpg`;
        document.getElementById('detail-overlay').style.display = 'flex';
        document.getElementById('det-desc-container').scrollTop = 0;
    };
    window.changeWall = (src) => { document.getElementById('wall-img').src = src; };
    window.clearCanvas = () => { const c = document.getElementById('tab-canvas'); if(c) c.getContext('2d').clearRect(0,0,c.width,c.height); };

    function startStars() {
        const starCanvas = document.getElementById('star-canvas'), starCtx = starCanvas.getContext('2d');
        starCanvas.width = window.innerWidth; starCanvas.height = window.innerHeight;
        const stars = Array.from({length:100}, () => ({ x:Math.random()*starCanvas.width, y:Math.random()*starCanvas.height, size:Math.random()*2, alpha:Math.random(), speed:Math.random()*0.05 }));
        function anim() {
            starCtx.clearRect(0,0,starCanvas.width,starCanvas.height);
            stars.forEach(s => { s.alpha += s.speed; if(s.alpha>1 || s.alpha<0) s.speed *= -1; starCtx.fillStyle=`rgba(255,255,255,${Math.abs(s.alpha)})`; starCtx.beginPath(); starCtx.arc(s.x, s.y, s.size, 0, Math.PI*2); starCtx.fill(); });
            requestAnimationFrame(anim);
        }
        anim();
    }
    window.onload = () => { window.nav('p1'); };
    audio.onended = () => window.nextTrack();
    audio.src = playlist[0].src; trackLabel.innerText = playlist[0].name;
</script>
</body>
</html>
